<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yuli - Feed ended!</title>
<style>body{background:#0f1117;color:#e4e4e7;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center}
.box{padding:40px}.emoji{font-size:80px;margin-bottom:16px}.msg{font-size:24px;font-weight:700;margin-bottom:8px}.sub{color:#71717a;font-size:14px}.err{color:#ef4444}</style>
</head><body><div class="box"><div class="emoji">⏹️</div><div class="msg" id="msg">Logging...</div><div class="sub" id="sub"></div></div>
<script>
fetch("https://us-central1-yuli-tracker.cloudfunctions.net/babyApi?family=mello-ackerman&voice=endfeed",{method:"POST"})
  .then(function(r){return r.json()})
  .then(function(d){document.getElementById("msg").textContent=d.message||"Feed ended!";document.getElementById("sub").textContent="You can close this page"})
  .catch(function(e){document.getElementById("msg").textContent="Error";document.getElementById("msg").className="err";document.getElementById("sub").textContent=e.message})
</script></body></html>
