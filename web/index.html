<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuli Tracker</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--card2:#151820;--border:#2a2d3a;--text:#e4e4e7;--muted:#71717a;--purple:#8b5cf6;--pdim:rgba(139,92,246,0.15);--sleep:#a78bfa;--feed:#f59e0b;--diaper:#2dd4bf;--pump:#f472b6;--sleepdim:rgba(167,139,250,0.1);--feeddim:rgba(245,158,11,0.1);--diaperdim:rgba(45,212,191,0.1);--pumpdim:rgba(244,114,182,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:200px;background:var(--card);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:0;height:100vh}
.sidebar .logo{padding:0 20px 20px;font-size:1.2rem;font-weight:700;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar .logo span{color:var(--purple)}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--muted);font-size:0.9rem;transition:all 0.15s;border-left:3px solid transparent}
.sidebar .nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.sidebar .nav-item.active{color:var(--purple);background:var(--pdim);border-left-color:var(--purple);font-weight:600}
.sidebar .nav-item .icon{font-size:1.1rem}
.sidebar .bottom{position:absolute;bottom:0;width:100%;border-top:1px solid var(--border);padding:12px 20px}
.sidebar .fam-code{font-size:0.75rem;color:var(--muted)}
.sidebar .fam-name{font-size:0.85rem;font-weight:600;margin-bottom:2px}
.sidebar .change-btn{font-size:0.75rem;color:var(--purple);cursor:pointer;text-decoration:underline}
.main{flex:1;padding:32px 40px;max-width:960px}
@media(max-width:768px){
  .shell{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;display:flex;flex-wrap:wrap;padding:10px;gap:0;align-items:center}
  .sidebar .logo{padding:0 12px 0 0;border:none;margin:0;font-size:1rem}
  .sidebar .nav-item{padding:8px 14px;border-left:none;border-bottom:2px solid transparent;font-size:0.82rem}
  .sidebar .nav-item.active{border-bottom-color:var(--purple);border-left:none}
  .sidebar .bottom{position:relative;margin-left:auto;border:none;padding:0 12px;display:flex;align-items:center;gap:8px}
  .sidebar .fam-name{margin:0;font-size:0.78rem} .sidebar .fam-code{display:none}
  .main{padding:16px}
}
.page-title{font-size:1.3rem;font-weight:700;margin-bottom:20px}
.stats-section{background:var(--card2);border-radius:14px;padding:20px;margin-bottom:24px;border:1px solid var(--border)}
.sub-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.sub-tab{padding:10px 18px;cursor:pointer;font-size:0.88rem;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color 0.15s,border-color 0.15s;white-space:nowrap}
.sub-tab:hover{color:var(--text)}
.sub-tab.active{color:var(--text);border-bottom-color:var(--feed);font-weight:600}
.section-label{font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.stat .em{font-size:1.5rem;flex-shrink:0;margin-top:2px}
.stat .info{flex:1}
.stat .t{font-weight:700;font-size:0.95rem;margin-bottom:2px}
.stat .l{font-size:0.85rem;color:var(--muted);line-height:1.5}
.stat .l2{font-size:0.78rem;color:#555;line-height:1.4}
.ongoing{background:var(--sleepdim);border:2px solid var(--sleep);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:opacity 0.15s}
.ongoing:hover{opacity:0.85}
.ongoing.feed{background:var(--feeddim);border-color:var(--feed)}
.ongoing .em{font-size:1.5rem}
.ongoing .info{flex:1}
.ongoing .ot{font-weight:700;font-size:1rem;color:var(--sleep)}
.ongoing.feed .ot{color:var(--feed)}
.ongoing .sub{font-size:0.82rem;color:var(--muted)}
.log-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin-bottom:24px}
.lbtn{border:2px solid var(--border);border-radius:14px;padding:20px 10px;text-align:center;cursor:pointer;transition:all 0.15s;background:transparent}
.lbtn:hover{border-color:var(--purple);background:var(--pdim);transform:translateY(-1px)}
.lbtn.active{border-color:var(--sleep);background:var(--sleepdim)}
.lbtn.active-f{border-color:var(--feed);background:var(--feeddim)}
.lbtn .le{font-size:2rem;margin-bottom:6px}
.lbtn .ll{font-size:0.95rem;font-weight:700}
.lbtn[data-t=sleep] .ll{color:var(--sleep)} .lbtn[data-t=feed] .ll{color:var(--feed)} .lbtn[data-t=diaper] .ll{color:var(--diaper)} .lbtn[data-t=pump] .ll{color:var(--pump)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{padding:6px 14px;border-radius:20px;font-size:0.82rem;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all 0.15s}
.chip:hover,.chip.sel{background:var(--pdim);color:var(--purple);border-color:var(--purple)}
.day-hdr{font-size:1rem;font-weight:700;color:var(--purple);margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.period-hdr{font-size:0.78rem;color:var(--muted);font-weight:600;margin:12px 0 6px;padding-left:4px}
.ev-table{width:100%;border-collapse:collapse}
.ev-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top}
.ev-table tr:hover{background:rgba(255,255,255,0.02)}
.ev-table .td-time{width:60px;font-size:0.95rem;font-weight:600;color:var(--muted)}
.ev-table .td-event{font-size:0.9rem}
.ev-table .td-props{font-size:0.8rem;color:var(--muted);padding-top:2px}
.ev-table .td-acts{width:80px;text-align:right}
.ev-table .td-acts button{background:none;border:none;cursor:pointer;font-size:0.85rem;padding:4px 8px;border-radius:6px;color:var(--muted)}
.ev-table .td-acts button:hover{background:var(--pdim)}
.ev-table .td-acts .del:hover{color:#ef4444;background:rgba(239,68,68,0.1)}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:440px;width:92%;box-shadow:0 8px 32px rgba(0,0,0,0.4);max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:20px;font-size:1.15rem}
.modal .step-label{font-size:0.88rem;color:var(--muted);margin-bottom:10px}
.modal .step-sub{font-size:0.78rem;color:#555;margin-bottom:10px}
.modal .opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.modal .opt{padding:10px 18px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;font-size:0.88rem;font-weight:500;transition:all 0.15s}
.modal .opt:hover{border-color:var(--purple)}
.modal .opt.sel{border-color:var(--purple);background:var(--pdim);color:var(--purple);font-weight:700}
.modal .opt.sel-r{border-color:#ef4444;background:rgba(239,68,68,0.1);color:#ef4444;font-weight:700}
.modal .opt.sel-o{border-color:var(--feed);background:var(--feeddim);color:var(--feed);font-weight:700}
.modal .opt.sel-p{border-color:var(--pump);background:var(--pumpdim);color:var(--pump);font-weight:700}
.modal .custom-row{margin-bottom:14px}
.modal .custom-row input,.modal .custom-row select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;width:100%;font-size:0.9rem}
.modal .custom-row label{font-size:0.78rem;color:var(--muted);display:block;margin-bottom:4px}
.modal .btn-row{display:flex;gap:10px;margin-top:20px}
.modal .btn-row button{flex:1;padding:12px;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:opacity 0.15s}
.modal .btn-row button:hover{opacity:0.85}
.modal .btn-cancel{background:var(--border);color:var(--text)}
.modal .btn-save{background:var(--purple);color:#fff}
.snack{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 24px;font-size:0.9rem;z-index:200;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,0.5)}
.snack .undo{color:var(--purple);cursor:pointer;font-weight:700;font-size:0.85rem}
.connect-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center}
.connect-screen .big-emoji{font-size:4rem;margin-bottom:16px}
.connect-screen h2{margin-bottom:8px}
.connect-screen p{color:var(--muted);margin-bottom:24px;font-size:0.9rem}
.connect-screen input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:10px;font-size:1rem;width:260px;text-align:center;margin-bottom:12px}
.connect-screen button{background:var(--purple);color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer}
.loading{text-align:center;padding:60px;color:var(--muted)}
.loading .sp{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.stock-card .sc-title{font-weight:700;font-size:0.9rem;margin-bottom:6px}
.stock-card .sc-row{font-size:0.82rem;color:var(--muted);line-height:1.6}
.stock-card .sc-row.expired{color:#ef4444;text-decoration:line-through}
.stock-card .sc-row.spoiled{color:#ef4444;text-decoration:line-through}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.toggle-row .tr-label{font-size:0.95rem}
.toggle-row .tr-toggle{width:44px;height:24px;border-radius:12px;background:var(--border);cursor:pointer;position:relative;transition:background 0.2s}
.toggle-row .tr-toggle.on{background:var(--purple)}
.toggle-row .tr-toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left 0.2s}
.toggle-row .tr-toggle.on::after{left:22px}

.confetti-overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9999}
.confetti-msg{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:24px;font-weight:600;font-size:0.95rem;white-space:nowrap;z-index:10000;animation:confettiFade 1.8s ease-out forwards}
@keyframes confettiFade{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-20px)}}
</style>
</head>
<body>

<div id="connect-root"></div>
<div id="app-root" style="display:none">
  <div class="shell">
    <div class="sidebar" id="sidebar-nav">
      <div class="logo">👶 <span>Yuli</span></div>
      <div class="nav-item active" data-tab="home" onclick="setTab('home')"><span class="icon">🏠</span> Home</div>
      <div class="nav-item" data-tab="history" onclick="setTab('history')"><span class="icon">📋</span> History</div>
      <div class="nav-item" data-tab="insights" onclick="setTab('insights')"><span class="icon">📊</span> Insights</div>
      <div class="nav-item" data-tab="pump" onclick="setTab('pump')"><span class="icon">🥛</span> Pump</div>
      <div class="nav-item" data-tab="sleep_analysis" onclick="setTab('sleep_analysis')"><span class="icon">🌙</span> Sleep</div>
      <div class="nav-item" data-tab="settings" onclick="setTab('settings')"><span class="icon">⚙️</span> Settings</div>
      <div class="bottom">
        <div class="fam-name" id="fam-display"></div>
        <div class="fam-code">Family code</div>
        <div class="change-btn" onclick="disconnect()">Change</div>
      </div>
    </div>
    <div class="main" id="main"></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="snack-root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
var FC={apiKey:"AIzaSyAbCR1lJ3JIyHyRsV5IboL1h4LEwe9EQ2E",authDomain:"yuli-tracker.firebaseapp.com",projectId:"yuli-tracker",storageBucket:"yuli-tracker.firebasestorage.app",messagingSenderId:"842997071492",appId:"1:842997071492:web:e460e8f21d193e2bb6ccd1"};
firebase.initializeApp(FC);var db=firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(function(){});
var fid=localStorage.getItem('familyId')||'',unsub=null,allEv=[],tab='home',typeF='all',timeF='all',charts={},rd=7;
var cfg={trackSleep:true,trackFeed:true,trackDiaper:true,trackPump:false,birthDate:null};
var cfgUnsub=null;
var allMedicines=[],allMedicineGiven=[],medUnsub=null,medGivenUnsub=null;
var dismissedReminders={};

if(fid)startApp();else showConnect();

function showConnect(){
  document.getElementById('app-root').style.display='none';
  document.getElementById('connect-root').innerHTML='<div class="connect-screen"><div class="big-emoji">👶</div><h2>Baby Tracker</h2><p>Enter your family code to get started.<br>Share this code with your partner to sync data.</p><input type="text" id="fid" placeholder="e.g. smith-family" onkeydown="if(event.key===\'Enter\')connect()"/><br><button onclick="connect()">Get Started</button></div>';
}
function connect(){fid=document.getElementById('fid').value.trim().toLowerCase().replace(/\s+/g,'-');if(!fid)return;localStorage.setItem('familyId',fid);startApp()}
function disconnect(){localStorage.removeItem('familyId');fid='';if(unsub)unsub();if(cfgUnsub)cfgUnsub();if(medUnsub)medUnsub();if(medGivenUnsub)medGivenUnsub();showConnect()}
function startApp(){
  document.getElementById('connect-root').innerHTML='';
  document.getElementById('app-root').style.display='block';
  document.getElementById('fam-display').textContent=fid;
  listenConfig();
  listen();
  listenMedicines();
}
function listenConfig(){
  if(cfgUnsub)cfgUnsub();
  cfgUnsub=db.collection('families').doc(fid).collection('settings').doc('config').onSnapshot(function(doc){
    if(doc.exists){var d=doc.data();cfg={trackSleep:d.trackSleep!==false,trackFeed:d.trackFeed!==false,trackDiaper:d.trackDiaper!==false,trackPump:d.trackPump===true,birthDate:d.birthDate||null}}
    // Recover caregiver name from Firestore if missing from localStorage
    if(!localStorage.getItem('caregiver_name')){loadCaregiverNameFromCloud(function(){});}
    updateNav();render();
  });
}
function saveCfg(){db.collection('families').doc(fid).collection('settings').doc('config').set(cfg,{merge:true})}
function updateNav(){
  var sb=document.getElementById('sidebar-nav');
  sb.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('active',el.getAttribute('data-tab')===tab)});
}
function listen(){loadDeviceNames();if(unsub)unsub();document.getElementById('main').innerHTML='<div class="loading"><div class="sp"></div>Loading...</div>';
  var firstLoad=true;
  unsub=db.collection('families').doc(fid).collection('events').orderBy('startTime','desc').limit(500).onSnapshot(function(s){
    allEv=[];s.forEach(function(d){try{var data=d.data();if(!data.startTime)return;allEv.push(Object.assign({id:d.id},data,{startTime:data.startTime.toDate(),endTime:data.endTime?data.endTime.toDate():null,expiresAt:data.expiresAt?data.expiresAt.toDate():null}))}catch(e){}});
    if(firstLoad){firstLoad=false;render();}
    else if(tab==='home'){renderHomeStats();}  // in-place update, no full re-render
    else{render();}
  },function(e){document.getElementById('main').innerHTML='<div class="loading">Error: '+e.message+'</div>'})}

function setTab(t){tab=t;document.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('active',el.getAttribute('data-tab')===t)});render()}
function render(){Object.keys(charts).forEach(function(k){charts[k].destroy();delete charts[k]});
  if(tab==='home')renderHome();else if(tab==='history')renderHistory();else if(tab==='insights')renderInsights();else if(tab==='pump')renderPumpPage();else if(tab==='sleep_analysis')renderSleepAnalysis();else if(tab==='medicine')renderMedicine();else if(tab==='settings')renderSettings();}

// ==================== HOME ====================
// Compute stats from allEv — pure JS, no network calls
function computeHomeStats(){
  var now=new Date(),d24=new Date(now-864e5),d3=new Date(now-2592e5),cutoff12h=new Date(now-43200000);
  var ls=null,lf=null,ld=null,lp=null,ong=null;
  for(var i=0;i<allEv.length;i++){var e=allEv[i];
    if(!ls&&e.type==='sleep')ls=e;if(!lf&&e.type==='feed')lf=e;if(!ld&&e.type==='diaper')ld=e;if(!lp&&e.type==='pump')lp=e;
    if(!ong&&(e.type==='sleep'||e.type==='feed')&&e.source!=='pump'&&!e.endTime&&e.duration==null&&e.startTime>cutoff12h)ong=e;
    if(ls&&lf&&ld&&lp&&ong)break;}
  // Diapers
  var pees24=0,poops24=0;
  allEv.forEach(function(e){if(e.type==='diaper'&&e.startTime>d24){if(e.pee)pees24++;if(e.poop)poops24++;}});
  // Side recommendation
  var recSide=null,recReason=null;
  var breastFeeds=allEv.filter(function(e){return e.type==='feed'&&e.source!=='pump'&&e.side}).slice(0,20);
  var recentPumps=allEv.filter(function(e){return e.type==='pump'&&e.side&&e.side!=='both'}).slice(0,5);
  var lastBF=breastFeeds[0];
  if(lastBF){
    var lastSd=lastBF.side,otherSd=lastSd==='left'?'right':'left';
    var lastEnd=lastBF.endTime||lastBF.startTime,minsSince=Math.round((Date.now()-lastEnd.getTime())/60000);
    var dur=lastBF.duration||null,pumpsSince=recentPumps.filter(function(p){return p.startTime>lastEnd&&p.side!=='both'});
    if(minsSince>120){if(pumpsSince.length){var ps=pumpsSince[0].side;recSide=ps==='left'?'right':'left';recReason=ps+' was pumped since last feed — other side is fuller';}
      else{recSide=otherSd;recReason=Math.floor(minsSince/60)+'h+ gap — alternate to '+otherSd;}}
    else if(dur!==null&&dur<5){recSide=lastSd;recReason='Last feed very short ('+dur+'m) — offer '+lastSd+' again for hindmilk';}
    else if(dur!==null&&dur<10){recSide=lastSd;recReason='Last feed short ('+dur+'m) — offer '+lastSd+' again';}
    else if(pumpsSince.length){var ps2=pumpsSince[0].side;recSide=ps2==='left'?'right':'left';recReason=ps2+' was pumped — other side is fuller';}
    else{recSide=otherSd;recReason='Alternating — last was '+lastSd+(dur?' ('+dur+'m)':'');}
  }else if(recentPumps.length){var ps3=recentPumps[0].side;recSide=ps3==='left'?'right':'left';recReason='Recently pumped '+ps3+' — other side is fuller';}
  // Stock
  var pumpFeeds=allEv.filter(function(e){return e.type==='feed'&&e.source==='pump'});
  var usedMl={};pumpFeeds.forEach(function(f){
    if(f.linkedPumps){try{JSON.parse(f.linkedPumps).forEach(function(lp2){usedMl[lp2.id]=(usedMl[lp2.id]||0)+lp2.ml})}catch(err){}}
    else if(f.linkedPumpId){usedMl[f.linkedPumpId]=(usedMl[f.linkedPumpId]||0)+(f.mlFed||0);}});
  var stockItems=[];
  allEv.forEach(function(e){if(e.type!=='pump'||e.spoiled||!e.ml)return;var rem=e.ml-(usedMl[e.id]||0);if(rem<=0)return;if(e.expiresAt&&e.expiresAt<now)return;var st=e.storage||'room';stockItems.push({id:e.id,pumpId:e.pumpId,ml:rem,storage:st,expires:e.expiresAt,startTime:e.startTime});});
  return {ls:ls,lf:lf,ld:ld,lp:lp,ong:ong,recSide:recSide,recReason:recReason,stockItems:stockItems};}

// Update only the stats area without rebuilding the whole page
function renderHomeStats(){
  var el=document.getElementById('home-stats');
  if(!el){render();return;}  // fallback: full render if structure not ready
  el.innerHTML=buildHomeStatsHtml();}

function buildHomeStatsHtml(){
  var s=computeHomeStats(),now=new Date(),h='',ong=s.ong;
  // Medicine reminders
  getPendingReminders().forEach(function(r){
    var med=r.medicine,slot=r.scheduledTime;
    var dismissKey=med.id+'_'+slot+'_'+(r.slotDate?r.slotDate.getDate()+'_'+r.slotDate.getMonth():'');
    if(dismissedReminders[dismissKey])return;
    var dayLabel=r.dayLabel||('Today at '+slot);var isOverdue=r.isOverdue||false;
     var col=isOverdue?'#f97316':'#a855f7';
     h+='<div style="background:rgba('+(isOverdue?'249,115,22':'168,85,247')+',0.08);border:1.5px solid '+col+'99;border-radius:10px;padding:10px 12px;margin-bottom:6px">';
     h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
     h+='<span style="font-size:0.9rem">💊</span>';

function applyTimeFilter(arr,getTime){
  var now=new Date(),today6=new Date(now.getFullYear(),now.getMonth(),now.getDate(),6,0,0);
  if(timeF==="today")return arr.filter(function(e){return getTime(e)>=today6;});
  if(timeF==="yesterday"){var y6=new Date(today6-864e5);return arr.filter(function(e){return getTime(e)>=y6&&getTime(e)<today6;});}
  if(timeF==="2daysago"){var d2=new Date(today6-2*864e5),d1=new Date(today6-864e5);return arr.filter(function(e){return getTime(e)>=d2&&getTime(e)<d1;});}
  if(timeF==="3daysago"){var d3=new Date(today6-3*864e5),d2b=new Date(today6-2*864e5);return arr.filter(function(e){return getTime(e)>=d3&&getTime(e)<d2b;});}
  return arr;
}
function medRow(g){
  var time=pad(g.givenAt.getHours())+':'+pad(g.givenAt.getMinutes());
  var label='💊 '+g.medicineName+(g.dose?' · '+g.dose:'');
  var sub=g.scheduledTime?'sched: '+g.scheduledTime:'given';
  return '<tr><td class="td-time">'+time+'</td><td><div class="td-event">'+label+'</div><div class="td-props">'+sub+'</div></td>'
    +'<td class="td-acts"><button class="del" onclick="delMedGiven(\''+g.id+'\')" title="Delete">🗑</button></td></tr>';
}
function resumeEvent(id){
  db.collection('families').doc(fid).collection('events').doc(id).update({
    endTime: firebase.firestore.FieldValue.delete(),

  }).then(function(){showSnack('Resumed');});
}
function delMedGiven(id){

}
function renderHistory(){
  var h='<div class="page-title">History</div>';
  h+='<div class="filters">';
  var types=[{k:'all',l:'All'}];
  if(cfg.trackSleep)types.push({k:'sleep',l:'😴 Sleep'});
  if(cfg.trackFeed)types.push({k:'feed',l:'🍼 Feed'});
  if(cfg.trackDiaper)types.push({k:'diaper',l:'🧷 Diaper'});
  if(cfg.trackPump)types.push({k:'pump',l:'🧴 Pump'});
  types.push({k:'medicine',l:'💊 Medicine'});
  types.forEach(function(f){h+='<span class="chip '+(typeF===f.k?'sel':'')+'" onclick="typeF=\''+ f.k+'\';render()">'+f.l+'</span>';});
  h+='</div>';
  if(typeF!=='medicine'){
    h+='<div class="filters" style="margin-bottom:16px">';
    ['all','today','yesterday','2daysago','3daysago'].forEach(function(f){
      var lbl={all:'All time',today:'Today',yesterday:'Yesterday','2daysago':'2 days ago','3daysago':'3 days ago'}[f];
      h+='<span class="chip '+(timeF===f?'sel':'')+'" onclick="timeF=\''+f+'\';render()">'+lbl+'</span>';});
    h+='</div>';
  } else { h+='<div style="margin-bottom:16px"></div>'; }

  if(typeF==='medicine'){
    var medEvs=applyTimeFilter(allMedicineGiven.slice(),function(g){return g.givenAt;});
    if(!medEvs.length){h+='<div style="text-align:center;padding:40px;color:var(--muted)">No medicine given yet</div>';document.getElementById('main').innerHTML=h;return;}
    var mg={};medEvs.forEach(function(g){var dk=dayLabel(g.givenAt);if(!mg[dk])mg[dk]=[];mg[dk].push(g);});
    Object.keys(mg).forEach(function(dk){
      h+='<div class="day-hdr">'+dk+'</div><table class="ev-table">';
      mg[dk].forEach(function(g){h+=medRow(g);});
      h+='</table>';
    });
    document.getElementById('main').innerHTML=h;return;
  }

  var evs=allEv.slice();
  if(typeF!=='all')evs=evs.filter(function(e){return e.type===typeF;});
  evs=applyTimeFilter(evs,function(e){return e.startTime;});
  var unified=evs.map(function(e){return {type:'event',time:e.startTime,data:e};});
  if(typeF==='all'){
    var medFiltered=applyTimeFilter(allMedicineGiven.slice(),function(g){return g.givenAt;});
    medFiltered.forEach(function(g){unified.push({type:'medicine',time:g.givenAt,data:g});});
    unified.sort(function(a,b){return b.time-a.time;});
  }
  if(!unified.length){h+='<div style="text-align:center;padding:40px;color:var(--muted)">No events</div>';document.getElementById('main').innerHTML=h;return;}

  var grouped={};
  unified.forEach(function(item){var dk=dayLabel(item.time);if(!grouped[dk])grouped[dk]=[];grouped[dk].push(item);});
  Object.keys(grouped).forEach(function(dk){
    h+='<div class="day-hdr">'+dk+'</div><table class="ev-table">';
    grouped[dk].forEach(function(item){
      if(item.type==='medicine'){h+=medRow(item.data);}
      else{
        var e=item.data;
        var time=pad(e.startTime.getHours())+':'+pad(e.startTime.getMinutes());
        var props=[];
        if(e.duration)props.push(fmtMin(e.duration));
        else if(e.endTime)props.push(fmt(e.endTime-e.startTime));
        else if((e.type==='sleep'||e.type==='feed')&&!e.endTime&&!e.duration)props.push('ongoing');
        if(e.side)props.push(e.side);
        if(e.source==='pump')props.push('pumped milk');
        if(e.mlFed)props.push(e.mlFed+'ml');
        if(e.type==='pump'){if(e.ml)props.push(e.ml+'ml');if(e.storage)props.push(e.storage);if(e.spoiled)props.push('⚠️ spoiled');}
        h+='<tr><td class="td-time">'+time+'</td><td><div class="td-event">'+displayName(e)+'</div>';
        if(props.length)h+='<div class="td-props">'+props.join(' · ')+'</div>';
        h+='</td><td class="td-acts"><button onclick="editEv(\''+e.id+'\')" >✏️</button> <button class="del" onclick="delEv(\''+e.id+'\',\''+displayName(e).replace(/'/g,"\\'")+'\')" >🗑</button></td></tr>';
      }
    });
    h+='</table>';
  });
  document.getElementById('main').innerHTML=h;
}

function renderPump(){
  var h='<div class="page-title">🧴 Pump & Stock</div>';
  var pumps=allEv.filter(function(e){return e.type==='pump'});
  var now=new Date();

  // Calculate stock: available pumps (not spoiled, not expired, with remaining ml)
  var feedsFromPump=allEv.filter(function(e){return e.type==='feed'&&e.source==='pump'});
  var usedMl={};feedsFromPump.forEach(function(f){
    if(f.linkedPumps){try{JSON.parse(f.linkedPumps).forEach(function(lp){usedMl[lp.id]=(usedMl[lp.id]||0)+lp.ml})}catch(e){}}
    else if(f.linkedPumpId){usedMl[f.linkedPumpId]=(usedMl[f.linkedPumpId]||0)+(f.mlFed||0)}
  });

  var stock={room:[],fridge:[],freezer:[]};
  pumps.forEach(function(p){
    if(p.spoiled)return;
    if(!p.ml)return;
    var remaining=p.ml-(usedMl[p.id]||0);
    if(remaining<=0)return;
    var expired=p.expiresAt&&p.expiresAt<now;
    if(expired)return;
    var st=p.storage||'room';
    if(stock[st])stock[st].push({id:p.id,ml:remaining,expires:p.expiresAt,pumpId:p.pumpId,startTime:p.startTime});
  });

  // 5-day avg pumped and used
  var d5=new Date(now-864e5*5);
  var pumps5d=pumps.filter(function(p){return p.startTime>=d5});
  var totalPumped5d=pumps5d.reduce(function(s,p){return s+(p.ml||0)},0);
  var avgPumped5d=totalPumped5d/5;
  var feeds5d=feedsFromPump.filter(function(f){return f.startTime>=d5});
  var totalUsed5d=feeds5d.reduce(function(s,f){
    var ml=f.mlFed||0;
    if(!ml&&f.linkedPumps){try{ml=JSON.parse(f.linkedPumps).reduce(function(s2,x){return s2+x.ml},0)}catch(e){}}
    return s+ml;
  },0);
  var avgUsed5d=totalUsed5d/5;

  // 1. Stock overview — show emoji, id, ml, expires, pumped at
  h+='<div class="stats-section"><div class="section-label">Stock Overview</div>';
  var storageEmojis={room:'🏠',fridge:'❄️',freezer:'🧊'};
  var storages=[{k:'room',l:'🏠 Room Temp',c:'4h'},{k:'fridge',l:'❄️ Fridge',c:'4 days'},{k:'freezer',l:'🧊 Freezer',c:'6 months'}];
  storages.forEach(function(s){
    var items=stock[s.k];
    h+='<div class="stock-card"><div class="sc-title">'+s.l+' (lasts '+s.c+')</div>';
    if(!items.length){h+='<div class="sc-row">No milk available</div>';}
    else{
      items.forEach(function(i){
        var idStr=i.pumpId?'#'+i.pumpId:'—';
        var expStr=i.expires?' · exp: '+shortDate(i.expires):'';
        var pumpedStr=i.startTime?shortDate(i.startTime):'';
        h+='<div class="sc-row"><b>'+idStr+'</b> · '+i.ml+'ml'+expStr+'</div>';
        if(pumpedStr)h+='<div class="sc-row" style="font-size:0.75rem;color:#555">pumped: '+pumpedStr+'</div>';
      });
    }
    h+='</div>';
  });
  h+='</div>';

  // 2. 5-day avg stats
  h+='<div class="section-label" style="margin-top:20px">5-Day Averages</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">';
  h+='<div class="stat" style="background:var(--card)"><div class="em">🥛</div><div class="info"><div class="t" style="color:var(--pump)">'+(avgPumped5d>0?Math.round(avgPumped5d)+'ml':'--')+'</div><div class="l">Avg pumped/day</div><div class="l2">5-day avg</div></div></div>';
  h+='<div class="stat" style="background:var(--card)"><div class="em">🍼</div><div class="info"><div class="t" style="color:var(--pump)">'+(avgUsed5d>0?Math.round(avgUsed5d)+'ml':'--')+'</div><div class="l">Avg used/day</div><div class="l2">5-day avg</div></div></div>';
  h+='</div>';

  // 3. Recently Pumped (last 3 days) — pump-centric, with usage info
  var d3=new Date(now-864e5*3);
  var recentPumps3d=pumps.filter(function(p){return p.startTime>=d3;});
  recentPumps3d.sort(function(a,b){return b.startTime-a.startTime;});

  h+='<div class="section-label" style="margin-top:20px">Recently Pumped (last 3 days)</div>';
  if(!recentPumps3d.length){h+='<div style="color:var(--muted);font-size:0.88rem;padding:12px 0">No pumps in the last 3 days</div>';}
  else{
    h+='<div class="stats-section" style="padding:0">';
    recentPumps3d.forEach(function(p,i){
      var totalUsed=usedMl[p.id]||0;
      var remaining=Math.max(0,(p.ml||0)-totalUsed);
      var fullyUsed=remaining<=0;
      var idStr=p.pumpId?'#'+p.pumpId:'—';
      var storEmoji=storageEmojis[p.storage||'room']||'🏠';
      var expStr=p.expiresAt?' · exp: '+shortDate(p.expiresAt):'';
      var usageStr=fullyUsed?'Fully used ('+totalUsed+'ml)':remaining+'ml remaining · '+totalUsed+'ml used';
      var timeColor=fullyUsed?'var(--muted)':'var(--text)';
      h+='<div style="padding:10px 14px;'+(i<recentPumps3d.length-1?'border-bottom:1px solid var(--border)':'')+'">'
        +'<div style="font-size:1rem;font-weight:700;margin-bottom:2px;color:'+timeColor+'">'+shortDate(p.startTime)+'</div>'
        +'<div style="font-size:0.82rem;color:var(--muted)">'+storEmoji+' '+idStr+' · '+(p.ml||0)+'ml'+expStr+'</div>'
        +'<div style="font-size:0.82rem;font-weight:600;color:'+(fullyUsed?'var(--muted)':'var(--pump)')+'">'+usageStr+'</div>'
        +'</div>';
    });
    h+='</div>';
  }

  document.getElementById('main').innerHTML=h;
}

function listenMedicines(){
  if(medUnsub)medUnsub();
  if(medGivenUnsub)medGivenUnsub();
  var since=new Date(Date.now()-30*864e5);
  medUnsub=db.collection('families').doc(fid).collection('medicines')
    .where('active','==',true)
    .onSnapshot(function(s){
      allMedicines=[];
      s.forEach(function(d){try{var data=d.data();allMedicines.push(Object.assign({id:d.id},data));}catch(e){}});
      if(tab==='medicine')renderMedicine();
      if(tab==='home')renderHomeStats();
    });
  medGivenUnsub=db.collection('families').doc(fid).collection('medicineGiven')
    .where('givenAt','>=',firebase.firestore.Timestamp.fromDate(since))
    .orderBy('givenAt','desc')
    .onSnapshot(function(s){
      allMedicineGiven=[];
      s.forEach(function(d){try{var data=d.data();allMedicineGiven.push(Object.assign({id:d.id},data,{givenAt:data.givenAt.toDate()}));}catch(e){}});
      if(tab==='medicine')renderMedicine();
      if(tab==='home')renderHomeStats();

var _slotDayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function fmtSlotLabel(slotDate,slot,dayOffset){
  var d=pad(slotDate.getDate()),m=pad(slotDate.getMonth()+1);
  var dayName=_slotDayNames[(slotDate.getDay()+6)%7];
  if(dayOffset===0)return 'Today at '+slot;
  if(dayOffset===1)return 'Yesterday ('+dayName+' '+d+'/'+m+') at '+slot;
  return dayName+' '+d+'/'+m+' at '+slot;
}
function getStockByStorage(){
  var now=new Date();
  var usedMl={};
  allEv.filter(function(e){return e.type==='feed'&&e.linkedPumps;}).forEach(function(e){
    try{JSON.parse(e.linkedPumps).forEach(function(l){usedMl[l.pumpId]=(usedMl[l.pumpId]||0)+l.ml;});}catch(x){}
  });
  var stock={room:[],fridge:[],freezer:[]};
  allEv.forEach(function(e){
    if(e.type!=='pump'||e.spoiled||!e.ml)return;
    var rem=e.ml-(usedMl[e.id]||0);
    if(rem<=0)return;
    if(e.expiresAt&&e.expiresAt<now)return;
    var st=e.storage||'room';
    if(stock[st])stock[st].push({id:e.id,pumpId:e.pumpId,ml:rem,storage:st,expires:e.expiresAt,startTime:e.startTime});
  });
  return stock;
}

function getPendingReminders(){
  var now=new Date(),pending=[];
  var lookback=new Date(now.getTime()-48*3600000);
  var recentGiven=allMedicineGiven.filter(function(g){return g.givenAt>=lookback;});
  // Check past 3 days — fixes midnight disappear bug
  [0,1,2].forEach(function(dayOffset){
    var slotDate=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dayOffset);
    allMedicines.forEach(function(med){
      if(med.scheduleType==='asNeeded')return;
      if(med.scheduleType==='specificDays'){
        var dow=(slotDate.getDay()+6)%7;
        if(!med.daysOfWeek||!med.daysOfWeek.includes(dow))return;
      }
      (med.timesOfDay||[]).forEach(function(slot){
        var parts=slot.split(':'),slotH=+parts[0],slotM=+parts[1];
        var slotTime=new Date(slotDate.getFullYear(),slotDate.getMonth(),slotDate.getDate(),slotH,slotM);
        if(now<new Date(slotTime.getTime()-15*60000))return;
        if((now-slotTime)/3600000>48)return;
        var alreadyGiven=recentGiven.some(function(g){
          return g.medicineId===med.id&&g.scheduledTime===slot&&
            g.givenAt.getFullYear()===slotDate.getFullYear()&&
            g.givenAt.getMonth()===slotDate.getMonth()&&
            g.givenAt.getDate()===slotDate.getDate();
        });
        if(!alreadyGiven){
          var isToday=dayOffset===0;
          var isOverdue=!isToday||(now-slotTime)/60000>30;
          pending.push({medicine:med,scheduledTime:slot,slotTime:slotTime,slotDate:slotDate,
            dayLabel:fmtSlotLabel(slotDate,slot,dayOffset),isOverdue:isOverdue});
        }
      });
    });
  });
  // Sort: overdue first, then by slot time
  pending.sort(function(a,b){
    if(a.isOverdue&&!b.isOverdue)return -1;
    if(!a.isOverdue&&b.isOverdue)return 1;
    return a.slotTime-b.slotTime;
  });
  return pending;
}

function getContextualSuggestions(s){
  var suggs=[],now=new Date();
  // Feed suggestion
  if(s.lf){var feedEnd=s.lf.endTime||s.lf.startTime;var feedMins=Math.round((now-feedEnd)/60000);
    var avgGap=180; // TODO: compute from history
    if(feedMins>=(avgGap*0.8)&&feedMins<avgGap*1.5){
      var h=Math.floor(feedMins/60),m=feedMins%60;
      suggs.push('⏰ '+(h>0?h+'h ':'')+m+'m since last feed — usually every 3h');
    }
  }
  // Diaper suggestion
  if(s.ld){var diaperMins=Math.round((now-s.ld.startTime)/60000);
    if(diaperMins>=180){var dh=Math.floor(diaperMins/60),dm=diaperMins%60;
      suggs.push('🧷 '+dh+'h '+(dm>0?dm+'m ':'')+' since last diaper check');
    }
  }
  // Pump expiry warnings
  var stock=getStockByStorage();
  (stock.room||[]).forEach(function(item){
    if(item.expires){var minsLeft=Math.round((item.expires-now)/60000);
      if(minsLeft>0&&minsLeft<=60)suggs.push('⚠️ Room temp milk '+(item.pumpId?'#'+item.pumpId:'')+' expires in '+minsLeft+'m');
    }
  });
  (stock.fridge||[]).forEach(function(item){
    if(item.expires){var hLeft=Math.round((item.expires-now)/3600000);
      if(hLeft>0&&hLeft<=24)suggs.push('🧊 Fridge milk '+(item.pumpId?'#'+item.pumpId:'')+' expires in '+hLeft+'h — use soon');
    }
  });
  (stock.freezer||[]).forEach(function(item){
    if(item.expires){var dLeft=Math.round((item.expires-now)/86400000);
      if(dLeft>0&&dLeft<=30)suggs.push('🧊 Freezer milk '+(item.pumpId?'#'+item.pumpId:'')+' expires in '+dLeft+'d');
    }
  });
  return suggs;
}

    var days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  }
  return '';

// ==================== SLEEP ANALYSIS ====================

function getBabyAgeWeeks(){
  if(!cfg.birthDate)return null;
  var born=new Date(cfg.birthDate);
  var now=new Date();
  return Math.floor((now-born)/(7*864e5));
}

function getAgeBracket(weeks){
  if(weeks===null)return null;
  if(weeks<6)return '0-6w';
  if(weeks<12)return '6-12w';
  if(weeks<20)return '3-4m';
  if(weeks<28)return '4-6m';
  return '6m+';
}

function getSleepGapMinutes(weeks){
  if(weeks===null||weeks<6)return 45;
  if(weeks<12)return 60;
  return 90;
}

// Infer sleep gaps from event list (feed+diaper+pump events sorted by time)
// Returns array of {start, end, minutes} gaps within the night window (22:00-08:00)
function inferNightSleep(events, dateStart, dateEnd){
  // Get events strictly within night window
  var nightEvents=events.filter(function(e){
    return e.startTime>=dateStart && e.startTime<=dateEnd;
  }).sort(function(a,b){return a.startTime-b.startTime;});

  var gapMin=getSleepGapMinutes(getBabyAgeWeeks());
  var gaps=[];

  // Build a list of "awake points" = synthetic start + all event times + synthetic end
  // This lets us catch sleep from window-start to first event, and last event to window-end
  var points=[];
  points.push({t:dateStart,isEdge:true});
  nightEvents.forEach(function(e){points.push({t:e.endTime||e.startTime,isEdge:false});});
  points.push({t:dateEnd,isEdge:true});

  for(var i=1;i<points.length;i++){
    var prevT=points[i-1].t;
    var currT=points[i].t;
    var gapMins=Math.round((currT-prevT)/60000);
    if(gapMins>=gapMin && gapMins<600){
      gaps.push({start:prevT,end:currT,minutes:gapMins});
    }
  }
  return gaps;
}

function getNightWindow(baseDate){
  // Full inference window: 18:00–08:00 (catches early bedtimes)
  var d=new Date(baseDate);
  var start=new Date(d.getFullYear(),d.getMonth(),d.getDate(),18,0,0);
  var end=new Date(d.getFullYear(),d.getMonth(),d.getDate()+1,8,0,0);
  return {start:start,end:end};
}
function getStrictNightWindow(baseDate){
  // Strict 22:00–08:00 for total sleep + wakings counting only
  var d=new Date(baseDate);
  var start=new Date(d.getFullYear(),d.getMonth(),d.getDate(),22,0,0);
  var end=new Date(d.getFullYear(),d.getMonth(),d.getDate()+1,8,0,0);
  return {start:start,end:end};
}

function fmtHm(mins){
  if(mins<60)return mins+'m';
  var h=Math.floor(mins/60),m=mins%60;
  return m>0?h+'h '+m+'m':h+'h';
}

function getAgeTips(bracket,weeks){
  var tips={
    '0-6w':[
      '😴 At this age ('+weeks+' weeks), no sleep training — just observe and respond.',
      '🌯 Swaddling reduces the startle reflex and helps longer stretches.',
      '🌙 Keep night interactions quiet and dim to build day/night awareness.',
      '🍼 Feed on demand — frequent feeding is normal and needed for growth.',
      '✅ A 2–3h night stretch is great at this age. Any longer is a bonus.'
    ],

      '🌙 Aim for a consistent bedtime window of 8–10pm.',
      '✅ A 3–5h first stretch is excellent at '+weeks+' weeks.',
      '😴 Put baby down drowsy but still awake to start building self-soothing.',
      '☀️ Prioritise daytime feeds to shift more calories to the day.'
    ],
    '3-4m':[
      '⚠️ The 3–4 month sleep regression is real — expect disruption even if things were improving.',
      '✅ Target first stretch: 5–6h. Total night sleep: 9–11h.',
      '📅 A consistent bedtime routine (bath, feed, dark room) starts to matter now.',
      '😴 Drowsy-but-awake is key — avoid fully rocking to sleep.',
      '🍼 If cluster feeding in the evening, keep it going — it still helps.'
    ],
    '4-6m':[
      '✅ 6–8h first stretches are achievable. Total night sleep target: 10–12h.',
      '📅 Consistent bedtime 7–8pm is now important.',
      '😴 Gentle sleep training methods (fading, pick-up/put-down) are now appropriate.',
      '🌙 Night feeds may start naturally spacing out — follow the baby lead.',
      '💪 Daytime nap consolidation begins — 3 naps/day is typical.'
    ],
    '6m+':[
      '✅ Most babies can sleep 8–10h. Formal sleep training methods are appropriate.',
      '📅 Aim for bedtime 7–8pm with a consistent pre-sleep routine.',
      '🍼 Night weaning can be considered if weight gain is on track.',
      '💪 2 naps/day is typical — morning and afternoon.',
      '😴 Self-soothing is the goal — minimize intervention for night wakings.'
    ]
  };
  return tips[bracket]||tips['6-12w'];
}

function renderSleepAnalysis(){
  var h='<div class="page-title">🌙 Sleep Analysis</div>';
  var weeks=getBabyAgeWeeks();
  var bracket=getAgeBracket(weeks);

  if(!cfg.birthDate){
    h+='<div style="background:rgba(168,85,247,0.1);border:2px solid #a855f7;border-radius:12px;padding:16px;margin-bottom:16px">'
      +'<div style="font-weight:700;color:#a855f7;margin-bottom:4px">📅 Set baby birth date</div>'
      +'<div style="font-size:0.88rem;color:var(--muted);margin-bottom:12px">Add birth date in Settings for age-appropriate tips.</div>'
      +'<button id="go-settings-btn" style="background:#a855f7;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer">Go to Settings</button>'
      +'</div>';
  } else {
    h+='<div style="font-size:0.85rem;color:var(--muted);margin-bottom:16px">Yuli is <strong style="color:var(--text)">'+weeks+' weeks old</strong></div>';
  }

  var now=new Date();
  var allEvents=allEv.filter(function(e){
    return e.type==='feed'||e.type==='diaper'||e.type==='pump';
  });

  // ── Section 1: Last Night ──────────────────────────────────────────
  var baseOffset=now.getHours()<8?2:1;
  var lastNightBase=new Date(now.getFullYear(),now.getMonth(),now.getDate()-baseOffset);
  var dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var lastNightLabel=dayNames[lastNightBase.getDay()===0?6:lastNightBase.getDay()-1]+' '+pad(lastNightBase.getDate())+'/'+pad(lastNightBase.getMonth()+1);
  h+='<div class="section-label">🌙 Last Night · '+lastNightLabel+'</div>';
  var lastNight=getNightWindow(lastNightBase);
  var lastNightStrict=getStrictNightWindow(lastNight.start);
  var lastNightGaps=inferNightSleep(allEvents,lastNight.start,lastNight.end);
  var lastNightEvents=allEvents.filter(function(e){return e.startTime>=lastNight.start&&e.startTime<=lastNight.end;});
  var strictGaps=inferNightSleep(allEvents,lastNightStrict.start,lastNightStrict.end);
  
  if(!lastNightEvents.length && !lastNightGaps.length){
    h+='<div style="color:var(--muted);font-size:0.88rem;padding:12px 0">No data for last night yet.</div>';
  } else {
    var longestGap=lastNightGaps.length?Math.max.apply(null,lastNightGaps.map(function(g){return g.minutes;})):0;
    // Total sleep and wakings use strict 22:00-08:00 window
    var totalSleep=strictGaps.reduce(function(s,g){return s+g.minutes;},0);
    var wakings=Math.max(0,strictGaps.length-1);

    h+='<div style="font-size:0.75rem;color:var(--muted);margin-bottom:10px">Longest stretch: 18:00–08:00 · Total sleep: 22:00–08:00 · Gaps &gt;'+(getSleepGapMinutes(getBabyAgeWeeks()))+'min inferred as sleep</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">';
    h+='<div class="stat" style="background:var(--card)"><div class="em">💤</div><div class="info"><div class="t" style="color:#818cf8">'+(longestGap?fmtHm(longestGap):'--')+'</div><div class="l">Longest stretch</div></div></div>';
    h+='<div class="stat" style="background:var(--card)"><div class="em">🌙</div><div class="info"><div class="t" style="color:#818cf8">'+(totalSleep?fmtHm(totalSleep):'--')+'</div><div class="l">Total sleep</div><div class="l2">22:00–08:00</div></div></div>';
    h+='<div class="stat" style="background:var(--card)"><div class="em">👶</div><div class="info"><div class="t" style="color:#818cf8">'+wakings+'</div><div class="l">Night wakings</div></div></div>';
    h+='</div>';

    // Timeline: fixed 20:00 → 08:00
    var tlStart=new Date(lastNight.start.getFullYear(),lastNight.start.getMonth(),lastNight.start.getDate(),18,0,0).getTime();
    var tlEnd=lastNight.end.getTime();
    var tlRange=tlEnd-tlStart;

    // Events in window
    var tlEvents=allEvents.filter(function(e){
      return e.startTime.getTime()>=tlStart && e.startTime.getTime()<=tlEnd;
    });

    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px">';
    h+='<div style="font-size:0.8rem;font-weight:600;color:var(--muted);margin-bottom:10px">NIGHT TIMELINE (18:00 – 08:00)</div>';

    // Two shaded regions: 18:00-22:00 (light) and 22:00-08:00 (darker)
    var eveningShadeLeft=0;
    var eveningShadeWidth=(lastNightStrict.start.getTime()-tlStart)/tlRange*100;
    var nightShadeLeft=(lastNightStrict.start.getTime()-tlStart)/tlRange*100;
    var nightShadeWidth=(lastNightStrict.end.getTime()-lastNightStrict.start.getTime())/tlRange*100;

    h+='<div id="tl-bar" style="position:relative;height:40px;background:rgba(99,102,241,0.04);border-radius:6px;">';
    h+='<div style="position:absolute;top:0;bottom:0;left:'+eveningShadeLeft+'%;width:'+eveningShadeWidth+'%;background:rgba(99,102,241,0.05);border-radius:4px"></div>';
    h+='<div style="position:absolute;top:0;bottom:0;left:'+nightShadeLeft+'%;width:'+nightShadeWidth+'%;background:rgba(99,102,241,0.12);border-radius:4px"></div>';

    // Sleep blocks — with title for hover tooltip
    lastNightGaps.forEach(function(g){
      var left=Math.max(0,(g.start.getTime()-tlStart)/tlRange*100);
      var width=(g.minutes*60000)/tlRange*100;
      var clampedWidth=Math.min(width,100-left);
      var label=fmtHm(g.minutes)+' sleep';
      h+='<div title="'+label+'" style="position:absolute;top:4px;bottom:4px;left:'+left+'%;width:'+clampedWidth+'%;background:rgba(99,102,241,0.6);border-radius:4px;cursor:default"></div>';
    });

    // Event emoji markers
    tlEvents.forEach(function(e){
      var left=(e.startTime.getTime()-tlStart)/tlRange*100;
      if(left<0||left>100)return;
      var emoji=e.type==='feed'?'🍼':e.type==='diaper'?'🧷':'🥛';
      h+='<div style="position:absolute;top:50%;transform:translate(-50%,-50%);left:'+left+'%;font-size:15px;line-height:1;pointer-events:none">'+emoji+'</div>';
    });
    h+='</div>';

    // Time labels: fixed anchors + per-event labels
    // Build label set: fixed hours + event times, deduplicated by proximity
    var labelMs=[];
    // Fixed hour marks: 20,22,00,02,04,06,08
    [18,20,22,0,2,4,6,8].forEach(function(hh){
      var d=new Date(tlStart);
      d.setHours(hh,0,0,0);
      if(hh<20)d.setDate(d.getDate()+1); // next day for 00-08
      var ms=d.getTime();
      if(ms>=tlStart&&ms<=tlEnd)labelMs.push({ms:ms,fixed:true});
    });
    // Event times
    tlEvents.forEach(function(e){
      labelMs.push({ms:e.startTime.getTime(),fixed:false});
    });
    // Sort
    labelMs.sort(function(a,b){return a.ms-b.ms;});
    // Remove labels too close to each other (<30min)
    var filtered=[];
    labelMs.forEach(function(l){
      if(!filtered.length||l.ms-filtered[filtered.length-1].ms>=25*60000)filtered.push(l);
    });

    h+='<div style="position:relative;height:18px;margin-top:2px">';
    filtered.forEach(function(l){
      var left=(l.ms-tlStart)/tlRange*100;
      var d=new Date(l.ms);
      var lbl=pad(d.getHours())+':'+pad(d.getMinutes());
      var color=l.fixed?'var(--muted)':'var(--text)';
      var fw=l.fixed?'400':'600';
      h+='<span style="position:absolute;transform:translateX(-50%);left:'+left+'%;font-size:0.68rem;color:'+color+';font-weight:'+fw+'">'+lbl+'</span>';
    });
    h+='</div>';
    h+='</div>';
  }

  // ── Previous Nights (expandable) ─────────────────────────────────────
  h+='<div class="section-label" style="margin-top:4px">🌙 Previous Nights</div>';
  for(var pni=2;pni<=7;pni++){
    var pnBase=new Date(now.getFullYear(),now.getMonth(),now.getDate()-(now.getHours()<8?pni+1:pni));
    var pnLabel=dayNames[pnBase.getDay()===0?6:pnBase.getDay()-1]+' '+pad(pnBase.getDate())+'/'+pad(pnBase.getMonth()+1);
    var pnNight=getNightWindow(pnBase);
    var pnStrict=getStrictNightWindow(pnBase);
    var pnGaps=inferNightSleep(allEvents,pnNight.start,pnNight.end);
    var pnStrictGaps=inferNightSleep(allEvents,pnStrict.start,pnStrict.end);
    var pnLongest=pnGaps.length?Math.max.apply(null,pnGaps.map(function(g){return g.minutes;})):0;
    var pnTotal=pnStrictGaps.reduce(function(s,g){return s+g.minutes;},0);
    var pnWakings=Math.max(0,pnStrictGaps.length-1);
    var pnEvents=allEvents.filter(function(e){return e.startTime>=pnNight.start&&e.startTime<=pnNight.end;});
    var pnId='pn-'+pni;
    // Collapsed summary row — click to expand
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden">';
    h+='<div onclick="togglePrevNight(\''+pnId+'\')" style="display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer">';
    h+='<span style="font-size:0.85rem;font-weight:600;color:var(--text);min-width:90px">'+pnLabel+'</span>';
    h+='<span style="font-size:0.82rem;color:#818cf8;font-weight:600">'+(pnLongest?fmtHm(pnLongest):'--')+'</span>';
    h+='<span style="font-size:0.75rem;color:var(--muted)">longest</span>';
    h+='<span style="font-size:0.82rem;color:#2dd4bf;font-weight:600;margin-left:8px">'+(pnTotal?fmtHm(pnTotal):'--')+'</span>';
    h+='<span style="font-size:0.75rem;color:var(--muted)">total</span>';
    h+='<span style="font-size:0.75rem;color:var(--muted);margin-left:8px">'+pnWakings+' wakings</span>';
    h+='<span style="margin-left:auto;color:var(--muted);font-size:0.8rem" id="'+pnId+'-chevron">▸</span>';
    h+='</div>';
    // Expandable timeline (hidden by default)
    h+='<div id="'+pnId+'" style="display:none;padding:0 14px 12px">';
    if(pnEvents.length||pnGaps.length){
      // Mini timeline
      var pnTlStart=new Date(pnNight.start.getFullYear(),pnNight.start.getMonth(),pnNight.start.getDate(),18,0,0).getTime();
      var pnTlEnd=pnNight.end.getTime();
      var pnTlRange=pnTlEnd-pnTlStart;
      var pnNightShadeLeft=(pnStrict.start.getTime()-pnTlStart)/pnTlRange*100;
      var pnNightShadeWidth=(pnStrict.end.getTime()-pnStrict.start.getTime())/pnTlRange*100;
      h+='<div style="position:relative;height:36px;background:rgba(99,102,241,0.04);border-radius:6px;">';
      h+='<div style="position:absolute;top:0;bottom:0;left:'+pnNightShadeLeft+'%;width:'+pnNightShadeWidth+'%;background:rgba(99,102,241,0.12);border-radius:4px"></div>';
      pnGaps.forEach(function(g){
        var left=Math.max(0,(g.start.getTime()-pnTlStart)/pnTlRange*100);
        var width=(g.minutes*60000)/pnTlRange*100;
        h+='<div title="'+fmtHm(g.minutes)+' sleep" style="position:absolute;top:4px;bottom:4px;left:'+left+'%;width:'+Math.min(width,100-left)+'%;background:rgba(99,102,241,0.6);border-radius:3px;cursor:default"></div>';
      });
      pnEvents.forEach(function(e){
        var left=(e.startTime.getTime()-pnTlStart)/pnTlRange*100;
        if(left<0||left>100)return;
        var emoji=e.type==='feed'?'🍼':e.type==='diaper'?'🧷':'🥛';
        h+='<div style="position:absolute;top:50%;transform:translate(-50%,-50%);left:'+left+'%;font-size:13px;pointer-events:none">'+emoji+'</div>';
      });
      h+='</div>';
      h+='<div style="display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted);margin-top:3px"><span>18:00</span><span>22:00</span><span>02:00</span><span>05:00</span><span>08:00</span></div>';
    } else {
      h+='<div style="color:var(--muted);font-size:0.82rem">No data for this night</div>';
    }
    h+='</div></div>';
  }

  // ── Section 2: 7-Day Trend ─────────────────────────────────────────
  h+='<div class="section-label" style="margin-top:4px">📊 7-Day Trend</div>';
  var nightData=[];
  for(var di=7;di>=1;di--){
    var nd=getNightWindow(new Date(now.getFullYear(),now.getMonth(),now.getDate()-di));
    var ndStrict=getStrictNightWindow(new Date(now.getFullYear(),now.getMonth(),now.getDate()-di));
    var ng=inferNightSleep(allEvents,nd.start,nd.end);
    var ngStrict=inferNightSleep(allEvents,ndStrict.start,ndStrict.end);
    var longest=ng.length?Math.max.apply(null,ng.map(function(g){return g.minutes;})):0;
    var total=ngStrict.reduce(function(s,g){return s+g.minutes;},0);
    var d=new Date(nd.start);
    nightData.push({label:pad(d.getDate())+'/'+pad(d.getMonth()+1),longest:longest,total:total});
  }
  h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px">';
  h+='<div style="position:relative;height:160px"><canvas id="sleep-trend-chart"></canvas></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">';
  var avgLongest=nightData.filter(function(d){return d.longest>0;});
  var avgL=avgLongest.length?Math.round(avgLongest.reduce(function(s,d){return s+d.longest;},0)/avgLongest.length):0;
  var avgTotalArr=nightData.filter(function(d){return d.total>0;});
  var avgT=avgTotalArr.length?Math.round(avgTotalArr.reduce(function(s,d){return s+d.total;},0)/avgTotalArr.length):0;
  h+='<div style="text-align:center"><div style="font-size:1.2rem;font-weight:700;color:#818cf8">'+(avgL?fmtHm(avgL):'--')+'</div><div style="font-size:0.78rem;color:var(--muted)">Avg longest stretch</div></div>';
  h+='<div style="text-align:center"><div style="font-size:1.2rem;font-weight:700;color:#2dd4bf">'+(avgT?fmtHm(avgT):'--')+'</div><div style="font-size:0.78rem;color:var(--muted)">Avg total night sleep</div></div>';
  // Trend direction
  var trendDir='flat';
  if(nightData.length>=4){
    var firstHalf=nightData.slice(0,3).filter(function(d){return d.longest>0;});
    var secondHalf=nightData.slice(4).filter(function(d){return d.longest>0;});
    var fhAvg=firstHalf.length?firstHalf.reduce(function(s,d){return s+d.longest;},0)/firstHalf.length:0;
    var shAvg=secondHalf.length?secondHalf.reduce(function(s,d){return s+d.longest;},0)/secondHalf.length:0;
    if(shAvg>fhAvg+15)trendDir='up';else if(shAvg<fhAvg-15)trendDir='down';
  }
  var trendBlurb=trendDir==='up'?'📈 Longest stretch is growing — great progress this week.'
    :trendDir==='down'?'📉 Longest stretch shorter recently — could be a growth spurt or regression.'
    :'➡️ Night stretches are fairly consistent this week.';
  var benchMin7=bracket==='0-6w'?180:bracket==='6-12w'?240:bracket==='3-4m'?330:bracket==='4-6m'?420:480;
  var benchBlurb=bracket?'Age benchmark ('+fmtHm(benchMin7)+' longest stretch) is based on typical ranges for '+(weeks!==null?weeks+'-week':'this age')+' babies — individual variation is normal.':'';
  h+='<div style="font-size:0.8rem;color:var(--muted);margin-top:10px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5">'+trendBlurb+(benchBlurb?' '+benchBlurb:'')+'</div>';
  h+='</div></div>';

  // ── Section 3: Last Feed Before Night ─────────────────────────────
  h+='<div class="section-label" style="margin-top:4px">🍼 Evening Feeding Pattern</div>';
  var feedEvents=allEv.filter(function(e){return e.type==='feed';});
  var eveningData=[];
  for(var di2=7;di2>=1;di2--){
    var nd2=getNightWindow(new Date(now.getFullYear(),now.getMonth(),now.getDate()-di2));
    // Feeds in 6pm-midnight window
    var eveningStart=new Date(nd2.start.getFullYear(),nd2.start.getMonth(),nd2.start.getDate(),18,0,0);
    var eveningFeeds=feedEvents.filter(function(e){return e.startTime>=eveningStart&&e.startTime<nd2.start.getTime()+2*3600000;})
      .sort(function(a,b){return a.startTime-b.startTime;});
    if(!eveningFeeds.length)continue;
    var lastFeed=eveningFeeds[eveningFeeds.length-1];
    // Cluster: 2+ feeds within 2h before last feed
    var clusterWindow=new Date(lastFeed.startTime.getTime()-2*3600000);
    var clusterFeeds=eveningFeeds.filter(function(e){return e.startTime>=clusterWindow;});
    var isCluster=clusterFeeds.length>=2;
    // First stretch = gap after last feed end (may start before 22:00)
    var searchFrom=lastFeed.endTime||lastFeed.startTime;
    var ng2=inferNightSleep(allEvents,searchFrom,nd2.end);
    var firstStretch=ng2.length?ng2[0].minutes:0;
    eveningData.push({
      lastFeedTime:lastFeed.startTime,
      isCluster:isCluster,
      clusterCount:clusterFeeds.length,
      firstStretch:firstStretch
    });
  }

  var clusterNights=eveningData.filter(function(d){return d.isCluster;});
  var nonClusterNights=eveningData.filter(function(d){return !d.isCluster;});
  var avgClusterStretch=clusterNights.length?Math.round(clusterNights.reduce(function(s,d){return s+d.firstStretch;},0)/clusterNights.length):0;
  var avgNoClusterStretch=nonClusterNights.length?Math.round(nonClusterNights.reduce(function(s,d){return s+d.firstStretch;},0)/nonClusterNights.length):0;

  if(!eveningData.length){
    h+='<div style="color:var(--muted);font-size:0.88rem;padding:8px 0">Not enough data yet.</div>';
  } else {
    var lastFeedAvgMs=eveningData.reduce(function(s,d){return s+d.lastFeedTime.getTime();},0)/eveningData.length;
    var avgLastFeed=new Date(lastFeedAvgMs);

    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px">';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">';
    h+='<div style="text-align:center"><div style="font-size:1.1rem;font-weight:700;color:var(--feed)">'+pad(avgLastFeed.getHours())+':'+pad(avgLastFeed.getMinutes())+'</div><div style="font-size:0.78rem;color:var(--muted)">Avg last evening feed</div></div>';
    h+='<div style="text-align:center"><div style="font-size:1.1rem;font-weight:700;color:var(--feed)">'+clusterNights.length+'/'+eveningData.length+' nights</div><div style="font-size:0.78rem;color:var(--muted)">With cluster feeding</div></div>';
    h+='</div>';
    if(clusterNights.length>0 && nonClusterNights.length>0){
      h+='<div style="border-top:1px solid var(--border);padding-top:10px">';
      h+='<div style="font-size:0.82rem;color:var(--muted);margin-bottom:6px">First stretch after:</div>';
      h+='<div style="display:flex;gap:16px">';
      h+='<div><span style="color:#22c55e;font-weight:700">'+fmtHm(avgClusterStretch)+'</span> <span style="font-size:0.78rem;color:var(--muted)">with cluster feeding</span></div>';
      h+='<div><span style="color:#f59e0b;font-weight:700">'+fmtHm(avgNoClusterStretch)+'</span> <span style="font-size:0.78rem;color:var(--muted)">without</span></div>';
      h+='</div></div>';
    }
    // Bottom line blurb
    var cfBlurb2='';
    if(clusterNights.length>0&&nonClusterNights.length>0&&avgClusterStretch>avgNoClusterStretch){
      cfBlurb2='✅ Cluster feeding is working — nights with 2+ evening feeds produce ~'+fmtHm(avgClusterStretch)+' first stretch vs ~'+fmtHm(avgNoClusterStretch)+' without. Keep the evening feeds dense.';
    } else if(clusterNights.length>0&&nonClusterNights.length>0){
      cfBlurb2='Cluster feeding detected on '+clusterNights.length+'/'+eveningData.length+' nights but no clear difference yet — keep the pattern going, it takes consistency.';
    } else if(!clusterNights.length&&weeks!==null&&weeks>=6){
      cfBlurb2='No cluster feeding detected this week. Giordano recommends front-loading 2+ feeds in the 6–10pm window to maximise night calories.';
    }
    if(cfBlurb2)h+='<div style="font-size:0.8rem;color:var(--muted);margin-top:10px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5">'+cfBlurb2+'</div>';
    h+='</div>';
  }

  // ── Section 4: Daytime Feed Density ──────────────────────────────
  h+='<div class="section-label" style="margin-top:4px">☀️ Daytime Feed Density</div>';
  var dayFeedData=[];
  for(var dfi=6;dfi>=0;dfi--){
    var dfDate=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dfi);
    var dfStart=new Date(dfDate.getFullYear(),dfDate.getMonth(),dfDate.getDate(),8,0,0);
    var dfEnd=new Date(dfDate.getFullYear(),dfDate.getMonth(),dfDate.getDate(),20,0,0);
    var dayFeeds=feedEvents.filter(function(e){return e.startTime>=dfStart&&e.startTime<dfEnd;}).sort(function(a,b){return a.startTime-b.startTime;});
    if(!dayFeeds.length){dayFeedData.push({label:pad(dfDate.getDate())+'/'+pad(dfDate.getMonth()+1),count:0,avgGap:0});continue;}
    // Avg gap between feeds
    var gaps2=[];
    for(var gi=1;gi<dayFeeds.length;gi++){
      var g2=Math.round((dayFeeds[gi].startTime-dayFeeds[gi-1].startTime)/60000);
      if(g2>0&&g2<480)gaps2.push(g2);
    }
    var avgGap2=gaps2.length?Math.round(gaps2.reduce(function(s,v){return s+v;},0)/gaps2.length):0;
    dayFeedData.push({label:pad(dfDate.getDate())+'/'+pad(dfDate.getMonth()+1),count:dayFeeds.length,avgGap:avgGap2});
  }
  var avgDayFeeds=dayFeedData.filter(function(d){return d.count>0;});
  var avgFeedCount=avgDayFeeds.length?+(avgDayFeeds.reduce(function(s,d){return s+d.count;},0)/avgDayFeeds.length).toFixed(1):0;
  var avgFeedGap=avgDayFeeds.filter(function(d){return d.avgGap>0;});
  var avgGapVal=avgFeedGap.length?Math.round(avgFeedGap.reduce(function(s,d){return s+d.avgGap;},0)/avgFeedGap.length):0;
  var feedTargetOk=avgFeedCount>=4;
  h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px">';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">';
  h+='<div style="text-align:center"><div style="font-size:1.2rem;font-weight:700;color:var(--feed)">'+avgFeedCount+'</div><div style="font-size:0.78rem;color:var(--muted)">Avg feeds/day (8am–8pm)</div></div>';
  h+='<div style="text-align:center"><div style="font-size:1.2rem;font-weight:700;color:var(--feed)">'+(avgGapVal?fmtHm(avgGapVal):'--')+'</div><div style="font-size:0.78rem;color:var(--muted)">Avg gap between feeds</div></div>';
  h+='</div>';
  // 7-day bar mini chart
  h+='<div style="display:flex;align-items:flex-end;gap:4px;height:52px;margin-bottom:4px">';
  var maxCount=Math.max.apply(null,dayFeedData.map(function(d){return d.count;}))||1;
  dayFeedData.forEach(function(d){
    var px=d.count?Math.max(4,Math.round(d.count/maxCount*36)):0;
    var col=d.count>=4?'rgba(249,115,22,0.85)':'rgba(249,115,22,0.3)';
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;height:100%">'
      +'<div style="font-size:0.6rem;color:var(--muted);line-height:1">'+(d.count||'')+'</div>'
      +'<div style="width:100%;background:'+col+';height:'+px+'px;border-radius:3px 3px 0 0"></div>'
      +'<div style="font-size:0.6rem;color:var(--muted)">'+d.label+'</div>'
      +'</div>';
  });
  h+='</div>';
  var dfTarget=4;
  var dfBlurb='';
  if(avgFeedCount>=dfTarget){
    dfBlurb='✅ '+avgFeedCount+' avg daytime feeds — above Giordano target of 4+ evenly spaced feeds. Front-loading calories 8am–8pm is the key lever for longer night stretches.';
  } else if(avgFeedCount>0){
    dfBlurb='⚠️ '+avgFeedCount+' avg daytime feeds — below the 4-feed target. More frequent daytime feeds reduce night hunger. Try waking for feeds if gaps exceed 3–4h during the day.';
  } else {
    dfBlurb='No daytime feed data yet.';
  }
  if(avgGapVal>0){
    var gapIdeal=bracket==='0-6w'||bracket==='6-12w'?'2–3h':bracket==='3-4m'?'3–4h':'3.5–4h';
    dfBlurb+=' Avg gap between feeds: '+fmtHm(avgGapVal)+' (ideal for this age: '+gapIdeal+').';
  }
  h+='<div style="font-size:0.8rem;color:var(--muted);margin-top:6px;line-height:1.5">'+dfBlurb+'</div>';
  h+='</div>';

  // ── Section 5: Night Feed Trend ────────────────────────────────────
  h+='<div class="section-label" style="margin-top:4px">📉 Night Feed Trend</div>';
  var nightFeedTrend=[];
  for(var nfi=6;nfi>=0;nfi--){
    var nfNight=getNightWindow(new Date(now.getFullYear(),now.getMonth(),now.getDate()-nfi-1));
    var nfFeeds=feedEvents.filter(function(e){return e.startTime>=nfNight.start&&e.startTime<=nfNight.end;})
      .sort(function(a,b){return a.startTime-b.startTime;});
    // Group into sessions (feeds within 30min = one session)
    var nfSessions=0;
    if(nfFeeds.length){
      nfSessions=1;
      for(var si=1;si<nfFeeds.length;si++){
        var gap30=Math.round((nfFeeds[si].startTime-(nfFeeds[si-1].endTime||nfFeeds[si-1].startTime))/60000);
        if(gap30>30)nfSessions++;
      }
    }
    var nfDate=new Date(nfNight.start);
    nightFeedTrend.push({label:pad(nfDate.getDate())+'/'+pad(nfDate.getMonth()+1),count:nfSessions,feeds:nfFeeds});
  }
  var recentNightFeeds=nightFeedTrend.slice(-3).filter(function(d){return d.count>0;});
  var olderNightFeeds=nightFeedTrend.slice(0,4).filter(function(d){return d.count>0;});
  var recentAvg=recentNightFeeds.length?+(recentNightFeeds.reduce(function(s,d){return s+d.count;},0)/recentNightFeeds.length).toFixed(1):0;
  var olderAvg=olderNightFeeds.length?+(olderNightFeeds.reduce(function(s,d){return s+d.count;},0)/olderNightFeeds.length).toFixed(1):0;
  var trend=recentAvg<olderAvg?'down':recentAvg>olderAvg?'up':'flat';
  h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px">';
  h+='<div style="display:flex;align-items:flex-end;gap:4px;height:52px;margin-bottom:4px">';
  var maxNF=Math.max.apply(null,nightFeedTrend.map(function(d){return d.count;}))||1;
  nightFeedTrend.forEach(function(d){
    var px2=d.count?Math.max(4,Math.round(d.count/maxNF*36)):0;
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;height:100%">'
      +'<div style="font-size:0.6rem;color:var(--muted);line-height:1">'+(d.count||'')+'</div>'
      +'<div style="width:100%;background:rgba(99,102,241,0.7);height:'+px2+'px;border-radius:3px 3px 0 0"></div>'
      +'<div style="font-size:0.6rem;color:var(--muted)">'+d.label+'</div>'
      +'</div>';
  });
  h+='</div>';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-top:8px">';
  var trendEmoji=trend==='down'?'📉':trend==='up'?'📈':'➡️';
  var trendColor=trend==='down'?'#22c55e':trend==='up'?'#ef4444':'#f59e0b';
  var trendMsg=trend==='down'?'Trending down — great progress!':trend==='up'?'More night feeds recently':trend==='flat'?'Holding steady':'';
  h+='<span style="font-size:1.3rem">'+trendEmoji+'</span>';
  h+='<span style="font-size:0.88rem;color:'+trendColor+';font-weight:600">'+trendMsg+'</span>';
  h+='</div>';
  var nfBlurb='';
  if(recentAvg===0){nfBlurb='🌙 No night feeds recorded recently — great if baby is sleeping through!';}
  else if(trend==='down'){nfBlurb='📉 Down from '+olderAvg+' to '+recentAvg+' sessions/night. Giordano method involves gradually reducing night feeds — each reduction shows progress.';}
  else if(trend==='up'){nfBlurb='📈 Up from '+olderAvg+' to '+recentAvg+' sessions/night. Growth spurts and regressions are normal — check if daytime feeds are sufficient.';}
  else{nfBlurb='➡️ Holding steady at ~'+recentAvg+' sessions/night. Each session = one complete feeding (both sides counts as one).';}
  h+='<div style="font-size:0.8rem;color:var(--muted);margin-top:6px;line-height:1.5">'+nfBlurb+'</div>';
  h+='</div>';

  // ── Section 6+7: Combined Insights (data-driven recs + age tips) ──
  h+='<div class="section-label" style="margin-top:4px">🎯 Insights & Tips</div>';
  h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:24px">';
  var recs=[];
  // Based on daytime feeds
  if(avgFeedCount>0&&avgFeedCount<4){
    recs.push({icon:'🍼',color:'#f97316',text:'Averaging '+avgFeedCount+' daytime feeds — try to reach 4+ feeds between 8am–8pm. More calories during the day means less hunger at night (Giordano method).'});
  } else if(avgFeedCount>=4){
    recs.push({icon:'✅',color:'#22c55e',text:'Great daytime feeding density ('+avgFeedCount+' avg). This sets up well for longer night stretches.'});
  }
  // Based on night feed trend
  if(trend==='down'&&recentAvg<=1){
    recs.push({icon:'🌙',color:'#22c55e',text:'Night feeds reducing — down to ~'+recentAvg+' per night. Good progress toward longer stretches.'});
  } else if(trend==='up'){
    recs.push({icon:'⚠️',color:'#f59e0b',text:'Night feeds increased recently. Check for a growth spurt, or consider whether daytime feeds can be increased to compensate.'});
  }
  // Based on cluster feeding
  if(clusterNights.length>0&&nonClusterNights.length>0&&avgClusterStretch>avgNoClusterStretch){
    var diff=avgClusterStretch-avgNoClusterStretch;
    recs.push({icon:'🍇',color:'#a855f7',text:'Cluster feeding adds ~'+fmtHm(diff)+' to the first night stretch on average. Keep it up in the 6–10pm window.'});
  } else if(clusterNights.length===0&&weeks>=6){
    recs.push({icon:'🍇',color:'#a855f7',text:'No cluster feeding detected. Try 2+ feeds between 6–10pm to extend the first stretch.'});
  }
  // Based on longest stretch vs benchmark
  if(avgL>0&&bracket){
    var benchMin=bracket==='0-6w'?180:bracket==='6-12w'?240:bracket==='3-4m'?330:bracket==='4-6m'?420:480;
    if(avgL<benchMin*0.7){
      recs.push({icon:'📊',color:'#818cf8',text:'Longest stretch (avg '+fmtHm(avgL)+') is below the '+fmtHm(benchMin)+' benchmark for this age. Focus on daytime calories and a consistent bedtime window.'});
    } else if(avgL>=benchMin){
      recs.push({icon:'🏆',color:'#22c55e',text:'Longest stretch ('+fmtHm(avgL)+') meets or exceeds the age benchmark of '+fmtHm(benchMin)+'!'});
    }
  }
  // Based on bedtime consistency
  if(eveningData.length>=4){
    var bedtimeMins=eveningData.map(function(d){return d.lastFeedTime.getHours()*60+d.lastFeedTime.getMinutes();});
    var minBed=Math.min.apply(null,bedtimeMins),maxBed=Math.max.apply(null,bedtimeMins);
    if(maxBed-minBed>90){
      recs.push({icon:'📅',color:'#f59e0b',text:'Last evening feed varies by more than '+(Math.round((maxBed-minBed)/6)/10)+'h across nights. A more consistent bedtime window helps set the body clock.'});
    } else {
      recs.push({icon:'📅',color:'#22c55e',text:'Evening feed timing is consistent — good for setting a predictable body clock.'});
    }
  }
  // Data-driven recs sub-header
  if(recs.length){
    h+='<div style="font-size:0.72rem;font-weight:700;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px">BASED ON YOUR DATA</div>';
    recs.forEach(function(r){
      h+='<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start">'
        +'<span style="font-size:1.1rem;flex-shrink:0">'+r.icon+'</span>'
        +'<span style="font-size:0.87rem;line-height:1.5;color:'+r.color+'">'+r.text+'</span>'
        +'</div>';
    });
  } else {
    h+='<div style="font-size:0.72rem;font-weight:700;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px">BASED ON YOUR DATA</div>';
    h+='<div style="color:var(--muted);font-size:0.88rem;padding:6px 0;border-bottom:1px solid var(--border)">Not enough data yet. Keep tracking for personalised recommendations.</div>';
  }
  // Age tips sub-header
  if(bracket){
    var tips=getAgeTips(bracket,weeks);
    h+='<div style="font-size:0.72rem;font-weight:700;letter-spacing:0.08em;color:var(--muted);margin-top:14px;margin-bottom:8px">GENERAL TIPS FOR '+weeks+' WEEKS</div>';
    tips.forEach(function(tip){
      h+='<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);align-items:flex-start">'
        +'<span style="font-size:0.87rem;line-height:1.5;color:var(--muted)">'+tip+'</span>'
        +'</div>';
    });
  } else {
    h+='<div style="font-size:0.72rem;font-weight:700;letter-spacing:0.08em;color:var(--muted);margin-top:14px;margin-bottom:6px">GENERAL TIPS</div>';
    h+='<div style="color:var(--muted);font-size:0.88rem">Add birth date in Settings for age-specific tips.</div>';
  }
  h+='</div>';

  document.getElementById('main').innerHTML=h;
  var gsBtn=document.getElementById('go-settings-btn');
  if(gsBtn)gsBtn.addEventListener('click',function(){setTab('settings');});

  // Draw chart after DOM is ready
  if(nightData.some(function(d){return d.longest>0;})){
    var benchmarkH = bracket==='0-6w'?180:bracket==='6-12w'?240:bracket==='3-4m'?330:bracket==='4-6m'?420:480;
    dcx('sleep-trend-chart');
    charts['sleep-trend-chart']=new Chart(document.getElementById('sleep-trend-chart'),{
      type:'bar',
      data:{
        labels:nightData.map(function(d){return d.label;}),
        datasets:[
          {label:'Longest stretch',data:nightData.map(function(d){return+(d.longest/60).toFixed(2);}),backgroundColor:'rgba(99,102,241,0.8)',borderRadius:4,order:2},
          {label:'Total night sleep',data:nightData.map(function(d){return+(d.total/60).toFixed(2);}),backgroundColor:'rgba(45,212,191,0.5)',borderRadius:4,order:3},
          {label:'Age benchmark (longest stretch)',data:nightData.map(function(){return+(benchmarkH/60).toFixed(2);}),type:'line',borderColor:'rgba(99,102,241,0.9)',borderDash:[5,4],borderWidth:2,pointRadius:0,fill:false,order:1}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:tc,font:{size:10}}},tooltip:{callbacks:{label:function(c){var v=c.parsed.y;var h=Math.floor(v),m=Math.round((v-h)*60);return c.dataset.label+': '+(h>0?h+'h ':'')+(m>0?m+'m':'');}}}}  ,
        scales:{y:{beginAtZero:true,ticks:{color:tc,callback:function(v){return v+'h'}},grid:{color:gc2}},x:{ticks:{color:tc},grid:{display:false}}}
      }
    });
  }
}

function getSectionSummary(id) {
  var now = new Date();
  var d24 = new Date(now - 864e5);
  if(id === 'feed') {
    var feeds = allEv.filter(function(e){return e.type==='feed';});
    var cnt = feeds.filter(function(e){return e.startTime>=d24;}).length;
    var last = feeds[0];
    var lastStr = last ? fmt(now-(last.endTime||last.startTime))+' ago' : '--';
    var avg = getAvg('feed', 7);
    var badge = avg>0 ? compBadge(cnt, avg) : '';
    return cnt+' feeds today · last '+lastStr+' '+badge;
  }
  if(id === 'diaper') {
    var diapers = allEv.filter(function(e){return e.type==='diaper';});
    var cnt2 = diapers.filter(function(e){return e.startTime>=d24;}).length;
    var last2 = diapers[0];
    var lastStr2 = last2 ? fmt(now-last2.startTime)+' ago' : '--';
    var avg2 = getAvg('diaper', 7);
    var badge2 = avg2>0 ? compBadge(cnt2, avg2) : '';
    return cnt2+' today · last '+lastStr2+' '+badge2;
  }
  if(id === 'pump_removed') {
    var pumps = allEv.filter(function(e){return e.type==='pump'&&e.ml;});
    var ml24 = pumps.filter(function(e){return e.startTime>=d24;}).reduce(function(s,e){return s+(e.ml||0);},0);
    return ml24+'ml today';
  }
  if(id === 'medicine') {
    var pend = getPendingReminders(allMedicines);
    return pend.length ? pend.length+' pending' : 'all given ✓';
  }
  return '';
}

function compBadge(val, avg) {
  if(avg <= 0) return '';
  var diff = (val - avg) / avg;
  if(diff > 0.15) return '<span style="font-size:0.7rem;background:rgba(34,197,94,0.15);color:#22c55e;padding:1px 6px;border-radius:10px">↑ above avg</span>';
  if(diff < -0.15) return '<span style="font-size:0.7rem;background:rgba(239,68,68,0.1);color:#ef4444;padding:1px 6px;border-radius:10px">↓ below avg</span>';
  return '<span style="font-size:0.7rem;background:rgba(113,113,122,0.15);color:var(--muted);padding:1px 6px;border-radius:10px">≈ avg</span>';
}

function getAvg(type, days) {
  var cutoff = new Date(Date.now() - days*864e5);
  var evs = allEv.filter(function(e){return e.type===type&&e.startTime>=cutoff;});
  return evs.length / days;
}

function drawFeedGaps(canvasId, feeds) {
  if(!window.Chart||!feeds.length)return;
  var sorted=[].concat(feeds).sort(function(a,b){return a.startTime-b.startTime;});
  var gaps=[];
  for(var i=1;i<sorted.length;i++){
    var g=Math.round((sorted[i].startTime-(sorted[i-1].endTime||sorted[i-1].startTime))/60000);
    if(g>0&&g<480)gaps.push({label:pad(sorted[i].startTime.getHours())+':'+pad(sorted[i].startTime.getMinutes()),gap:g});
  }
  if(!gaps.length)return;
  if(charts[canvasId])charts[canvasId].destroy();
  charts[canvasId]=new Chart(document.getElementById(canvasId).getContext('2d'),{
    type:'bar',data:{labels:gaps.map(function(g){return g.label;}),
    datasets:[{label:'Gap (min)',data:gaps.map(function(g){return g.gap;}),backgroundColor:'rgba(249,115,22,0.6)',borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return fmtMin(v);}}}}}
  });
}
