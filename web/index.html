<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuli Tracker</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--card2:#151820;--border:#2a2d3a;--text:#e4e4e7;--muted:#71717a;--purple:#8b5cf6;--pdim:rgba(139,92,246,0.15);--sleep:#a78bfa;--feed:#f59e0b;--diaper:#2dd4bf;--pump:#f472b6;--sleepdim:rgba(167,139,250,0.1);--feeddim:rgba(245,158,11,0.1);--diaperdim:rgba(45,212,191,0.1);--pumpdim:rgba(244,114,182,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:200px;background:var(--card);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:0;height:100vh}
.sidebar .logo{padding:0 20px 20px;font-size:1.2rem;font-weight:700;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar .logo span{color:var(--purple)}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--muted);font-size:0.9rem;transition:all 0.15s;border-left:3px solid transparent}
.sidebar .nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.sidebar .nav-item.active{color:var(--purple);background:var(--pdim);border-left-color:var(--purple);font-weight:600}
.sidebar .nav-item .icon{font-size:1.1rem}
.sidebar .bottom{position:absolute;bottom:0;width:100%;border-top:1px solid var(--border);padding:12px 20px}
.sidebar .fam-code{font-size:0.75rem;color:var(--muted)}
.sidebar .fam-name{font-size:0.85rem;font-weight:600;margin-bottom:2px}
.sidebar .change-btn{font-size:0.75rem;color:var(--purple);cursor:pointer;text-decoration:underline}
.main{flex:1;padding:32px 40px;max-width:960px}
@media(max-width:768px){
  .shell{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;display:flex;flex-wrap:wrap;padding:10px;gap:0;align-items:center}
  .sidebar .logo{padding:0 12px 0 0;border:none;margin:0;font-size:1rem}
  .sidebar .nav-item{padding:8px 14px;border-left:none;border-bottom:2px solid transparent;font-size:0.82rem}
  .sidebar .nav-item.active{border-bottom-color:var(--purple);border-left:none}
  .sidebar .bottom{position:relative;margin-left:auto;border:none;padding:0 12px;display:flex;align-items:center;gap:8px}
  .sidebar .fam-name{margin:0;font-size:0.78rem} .sidebar .fam-code{display:none}
  .main{padding:16px}
}
.page-title{font-size:1.3rem;font-weight:700;margin-bottom:20px}
.stats-section{background:var(--card2);border-radius:14px;padding:20px;margin-bottom:24px;border:1px solid var(--border)}
.section-label{font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.stat .em{font-size:1.5rem;flex-shrink:0;margin-top:2px}
.stat .info{flex:1}
.stat .t{font-weight:700;font-size:0.95rem;margin-bottom:2px}
.stat .l{font-size:0.85rem;color:var(--muted);line-height:1.5}
.stat .l2{font-size:0.78rem;color:#555;line-height:1.4}
.ongoing{background:var(--sleepdim);border:2px solid var(--sleep);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:opacity 0.15s}
.ongoing:hover{opacity:0.85}
.ongoing.feed{background:var(--feeddim);border-color:var(--feed)}
.ongoing .em{font-size:1.5rem}
.ongoing .info{flex:1}
.ongoing .ot{font-weight:700;font-size:1rem;color:var(--sleep)}
.ongoing.feed .ot{color:var(--feed)}
.ongoing .sub{font-size:0.82rem;color:var(--muted)}
.log-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin-bottom:24px}
.lbtn{border:2px solid var(--border);border-radius:14px;padding:20px 10px;text-align:center;cursor:pointer;transition:all 0.15s;background:transparent}
.lbtn:hover{border-color:var(--purple);background:var(--pdim);transform:translateY(-1px)}
.lbtn.active{border-color:var(--sleep);background:var(--sleepdim)}
.lbtn.active-f{border-color:var(--feed);background:var(--feeddim)}
.lbtn .le{font-size:2rem;margin-bottom:6px}
.lbtn .ll{font-size:0.95rem;font-weight:700}
.lbtn[data-t=sleep] .ll{color:var(--sleep)} .lbtn[data-t=feed] .ll{color:var(--feed)} .lbtn[data-t=diaper] .ll{color:var(--diaper)} .lbtn[data-t=pump] .ll{color:var(--pump)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{padding:6px 14px;border-radius:20px;font-size:0.82rem;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all 0.15s}
.chip:hover,.chip.sel{background:var(--pdim);color:var(--purple);border-color:var(--purple)}
.day-hdr{font-size:1rem;font-weight:700;color:var(--purple);margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.period-hdr{font-size:0.78rem;color:var(--muted);font-weight:600;margin:12px 0 6px;padding-left:4px}
.ev-table{width:100%;border-collapse:collapse}
.ev-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top}
.ev-table tr:hover{background:rgba(255,255,255,0.02)}
.ev-table .td-time{width:60px;font-size:0.95rem;font-weight:600;color:var(--muted)}
.ev-table .td-event{font-size:0.9rem}
.ev-table .td-props{font-size:0.8rem;color:var(--muted);padding-top:2px}
.ev-table .td-acts{width:80px;text-align:right}
.ev-table .td-acts button{background:none;border:none;cursor:pointer;font-size:0.85rem;padding:4px 8px;border-radius:6px;color:var(--muted)}
.ev-table .td-acts button:hover{background:var(--pdim)}
.ev-table .td-acts .del:hover{color:#ef4444;background:rgba(239,68,68,0.1)}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:440px;width:92%;box-shadow:0 8px 32px rgba(0,0,0,0.4);max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:20px;font-size:1.15rem}
.modal .step-label{font-size:0.88rem;color:var(--muted);margin-bottom:10px}
.modal .step-sub{font-size:0.78rem;color:#555;margin-bottom:10px}
.modal .opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.modal .opt{padding:10px 18px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;font-size:0.88rem;font-weight:500;transition:all 0.15s}
.modal .opt:hover{border-color:var(--purple)}
.modal .opt.sel{border-color:var(--purple);background:var(--pdim);color:var(--purple);font-weight:700}
.modal .opt.sel-r{border-color:#ef4444;background:rgba(239,68,68,0.1);color:#ef4444;font-weight:700}
.modal .opt.sel-o{border-color:var(--feed);background:var(--feeddim);color:var(--feed);font-weight:700}
.modal .opt.sel-p{border-color:var(--pump);background:var(--pumpdim);color:var(--pump);font-weight:700}
.modal .custom-row{margin-bottom:14px}
.modal .custom-row input,.modal .custom-row select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;width:100%;font-size:0.9rem}
.modal .custom-row label{font-size:0.78rem;color:var(--muted);display:block;margin-bottom:4px}
.modal .btn-row{display:flex;gap:10px;margin-top:20px}
.modal .btn-row button{flex:1;padding:12px;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:opacity 0.15s}
.modal .btn-row button:hover{opacity:0.85}
.modal .btn-cancel{background:var(--border);color:var(--text)}
.modal .btn-save{background:var(--purple);color:#fff}
.snack{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 24px;font-size:0.9rem;z-index:200;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,0.5)}
.snack .undo{color:var(--purple);cursor:pointer;font-weight:700;font-size:0.85rem}
.connect-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center}
.connect-screen .big-emoji{font-size:4rem;margin-bottom:16px}
.connect-screen h2{margin-bottom:8px}
.connect-screen p{color:var(--muted);margin-bottom:24px;font-size:0.9rem}
.connect-screen input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:10px;font-size:1rem;width:260px;text-align:center;margin-bottom:12px}
.connect-screen button{background:var(--purple);color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer}
.loading{text-align:center;padding:60px;color:var(--muted)}
.loading .sp{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.stock-card .sc-title{font-weight:700;font-size:0.9rem;margin-bottom:6px}
.stock-card .sc-row{font-size:0.82rem;color:var(--muted);line-height:1.6}
.stock-card .sc-row.expired{color:#ef4444;text-decoration:line-through}
.stock-card .sc-row.spoiled{color:#ef4444;text-decoration:line-through}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.toggle-row .tr-label{font-size:0.95rem}
.toggle-row .tr-toggle{width:44px;height:24px;border-radius:12px;background:var(--border);cursor:pointer;position:relative;transition:background 0.2s}
.toggle-row .tr-toggle.on{background:var(--purple)}
.toggle-row .tr-toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left 0.2s}
.toggle-row .tr-toggle.on::after{left:22px}
</style>
</head>
<body>

<div id="connect-root"></div>
<div id="app-root" style="display:none">
  <div class="shell">
    <div class="sidebar" id="sidebar-nav">
      <div class="logo">👶 <span>Yuli</span></div>
      <div class="nav-item active" data-tab="home" onclick="setTab('home')"><span class="icon">🏠</span> Home</div>
      <div class="nav-item" data-tab="history" onclick="setTab('history')"><span class="icon">📋</span> History</div>
      <div class="nav-item" data-tab="feed" onclick="setTab('feed')" style="display:none"><span class="icon">🍼</span> Feed</div>
      <div class="nav-item" data-tab="sleep" onclick="setTab('sleep')" style="display:none"><span class="icon">😴</span> Sleep</div>
      <div class="nav-item" data-tab="diaper" onclick="setTab('diaper')" style="display:none"><span class="icon">🧷</span> Diaper</div>
      <div class="nav-item" data-tab="pump" onclick="setTab('pump')" style="display:none"><span class="icon">🧴</span> Pump</div>
      <div class="nav-item" data-tab="medicine" onclick="setTab('medicine')"><span class="icon">💊</span> Medicine</div>
      <div class="nav-item" data-tab="settings" onclick="setTab('settings')"><span class="icon">⚙️</span> Settings</div>
      <div class="bottom">
        <div class="fam-name" id="fam-display"></div>
        <div class="fam-code">Family code</div>
        <div class="change-btn" onclick="disconnect()">Change</div>
      </div>
    </div>
    <div class="main" id="main"></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="snack-root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
var FC={apiKey:"AIzaSyAbCR1lJ3JIyHyRsV5IboL1h4LEwe9EQ2E",authDomain:"yuli-tracker.firebaseapp.com",projectId:"yuli-tracker",storageBucket:"yuli-tracker.firebasestorage.app",messagingSenderId:"842997071492",appId:"1:842997071492:web:e460e8f21d193e2bb6ccd1"};
firebase.initializeApp(FC);var db=firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(function(){});
var fid=localStorage.getItem('familyId')||'',unsub=null,allEv=[],tab='home',typeF='all',timeF='all',charts={},rd=7;
var cfg={trackSleep:true,trackFeed:true,trackDiaper:true,trackPump:false};
var cfgUnsub=null;
var allMedicines=[],allMedicineGiven=[],medUnsub=null,medGivenUnsub=null;

if(fid)startApp();else showConnect();

function showConnect(){
  document.getElementById('app-root').style.display='none';
  document.getElementById('connect-root').innerHTML='<div class="connect-screen"><div class="big-emoji">👶</div><h2>Baby Tracker</h2><p>Enter your family code to get started.<br>Share this code with your partner to sync data.</p><input type="text" id="fid" placeholder="e.g. smith-family" onkeydown="if(event.key===\'Enter\')connect()"/><br><button onclick="connect()">Get Started</button></div>';
}
function connect(){fid=document.getElementById('fid').value.trim().toLowerCase().replace(/\s+/g,'-');if(!fid)return;localStorage.setItem('familyId',fid);startApp()}
function disconnect(){localStorage.removeItem('familyId');fid='';if(unsub)unsub();if(cfgUnsub)cfgUnsub();if(medUnsub)medUnsub();if(medGivenUnsub)medGivenUnsub();showConnect()}
function startApp(){
  document.getElementById('connect-root').innerHTML='';
  document.getElementById('app-root').style.display='block';
  document.getElementById('fam-display').textContent=fid;
  listenConfig();
  listen();
  listenMedicines();
}
function listenConfig(){
  if(cfgUnsub)cfgUnsub();
  cfgUnsub=db.collection('families').doc(fid).collection('settings').doc('config').onSnapshot(function(doc){
    if(doc.exists){var d=doc.data();cfg={trackSleep:d.trackSleep!==false,trackFeed:d.trackFeed!==false,trackDiaper:d.trackDiaper!==false,trackPump:d.trackPump===true}}
    updateNav();render();
  });
}
function saveCfg(){db.collection('families').doc(fid).collection('settings').doc('config').set(cfg)}
function updateNav(){
  var sb=document.getElementById('sidebar-nav');
  var show={feed:cfg.trackFeed,sleep:cfg.trackSleep,diaper:cfg.trackDiaper,pump:cfg.trackPump};
  ['feed','sleep','diaper','pump'].forEach(function(t){
    var el=sb.querySelector('.nav-item[data-tab='+t+']');
    if(el)el.style.display=show[t]?'':'none';
  });
  sb.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('active',el.getAttribute('data-tab')===tab)});
}
function listen(){if(unsub)unsub();document.getElementById('main').innerHTML='<div class="loading"><div class="sp"></div>Loading...</div>';
  var firstLoad=true;
  unsub=db.collection('families').doc(fid).collection('events').orderBy('startTime','desc').limit(500).onSnapshot(function(s){
    allEv=[];s.forEach(function(d){try{var data=d.data();if(!data.startTime)return;allEv.push(Object.assign({id:d.id},data,{startTime:data.startTime.toDate(),endTime:data.endTime?data.endTime.toDate():null,expiresAt:data.expiresAt?data.expiresAt.toDate():null}))}catch(e){}});
    if(firstLoad){firstLoad=false;render();}
    else if(tab==='home'){renderHomeStats();}  // in-place update, no full re-render
    else{render();}
  },function(e){document.getElementById('main').innerHTML='<div class="loading">Error: '+e.message+'</div>'})}

function setTab(t){tab=t;document.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('active',el.getAttribute('data-tab')===t)});render()}
function render(){Object.keys(charts).forEach(function(k){charts[k].destroy();delete charts[k]});
  if(tab==='home')renderHome();else if(tab==='history')renderHistory();else if(tab==='feed')renderFeedTab();else if(tab==='sleep')renderSleepTab();else if(tab==='diaper')renderDiaperTab();else if(tab==='pump')renderPump();else if(tab==='medicine')renderMedicine();else if(tab==='settings')renderSettings()}

// ==================== HOME ====================
// Compute stats from allEv — pure JS, no network calls
function computeHomeStats(){
  var now=new Date(),d24=new Date(now-864e5),d3=new Date(now-2592e5),cutoff12h=new Date(now-43200000);
  var ls=null,lf=null,ld=null,lp=null,ong=null;
  for(var i=0;i<allEv.length;i++){var e=allEv[i];
    if(!ls&&e.type==='sleep')ls=e;if(!lf&&e.type==='feed')lf=e;if(!ld&&e.type==='diaper')ld=e;if(!lp&&e.type==='pump')lp=e;
    if(!ong&&(e.type==='sleep'||e.type==='feed')&&e.source!=='pump'&&!e.endTime&&e.duration==null&&e.startTime>cutoff12h)ong=e;
    if(ls&&lf&&ld&&lp&&ong)break;}
  // Diapers
  var pees24=0,poops24=0;
  allEv.forEach(function(e){if(e.type==='diaper'&&e.startTime>d24){if(e.pee)pees24++;if(e.poop)poops24++;}});
  // Side recommendation
  var recSide=null,recReason=null;
  var breastFeeds=allEv.filter(function(e){return e.type==='feed'&&e.source!=='pump'&&e.side}).slice(0,20);
  var recentPumps=allEv.filter(function(e){return e.type==='pump'&&e.side&&e.side!=='both'}).slice(0,5);
  var lastBF=breastFeeds[0];
  if(lastBF){
    var lastSd=lastBF.side,otherSd=lastSd==='left'?'right':'left';
    var lastEnd=lastBF.endTime||lastBF.startTime,minsSince=Math.round((Date.now()-lastEnd.getTime())/60000);
    var dur=lastBF.duration||null,pumpsSince=recentPumps.filter(function(p){return p.startTime>lastEnd&&p.side!=='both'});
    if(minsSince>120){if(pumpsSince.length){var ps=pumpsSince[0].side;recSide=ps==='left'?'right':'left';recReason=ps+' was pumped since last feed — other side is fuller';}
      else{recSide=otherSd;recReason=Math.floor(minsSince/60)+'h+ gap — alternate to '+otherSd;}}
    else if(dur!==null&&dur<5){recSide=lastSd;recReason='Last feed very short ('+dur+'m) — offer '+lastSd+' again for hindmilk';}
    else if(dur!==null&&dur<10){recSide=lastSd;recReason='Last feed short ('+dur+'m) — offer '+lastSd+' again';}
    else if(pumpsSince.length){var ps2=pumpsSince[0].side;recSide=ps2==='left'?'right':'left';recReason=ps2+' was pumped — other side is fuller';}
    else{recSide=otherSd;recReason='Alternating — last was '+lastSd+(dur?' ('+dur+'m)':'');}
  }else if(recentPumps.length){var ps3=recentPumps[0].side;recSide=ps3==='left'?'right':'left';recReason='Recently pumped '+ps3+' — other side is fuller';}
  // Stock
  var pumpFeeds=allEv.filter(function(e){return e.type==='feed'&&e.source==='pump'});
  var usedMl={};pumpFeeds.forEach(function(f){
    if(f.linkedPumps){try{JSON.parse(f.linkedPumps).forEach(function(lp2){usedMl[lp2.id]=(usedMl[lp2.id]||0)+lp2.ml})}catch(err){}}
    else if(f.linkedPumpId){usedMl[f.linkedPumpId]=(usedMl[f.linkedPumpId]||0)+(f.mlFed||0);}});
  var stockItems=[];
  allEv.forEach(function(e){if(e.type!=='pump'||e.spoiled||!e.ml)return;var rem=e.ml-(usedMl[e.id]||0);if(rem<=0)return;if(e.expiresAt&&e.expiresAt<now)return;var st=e.storage||'room';stockItems.push({id:e.id,pumpId:e.pumpId,ml:rem,storage:st,expires:e.expiresAt,startTime:e.startTime});});
  return {ls:ls,lf:lf,ld:ld,lp:lp,ong:ong,recSide:recSide,recReason:recReason,stockItems:stockItems};}

// Update only the stats area without rebuilding the whole page
function renderHomeStats(){
  var el=document.getElementById('home-stats');
  if(!el){render();return;}  // fallback: full render if structure not ready
  el.innerHTML=buildHomeStatsHtml();}

function buildHomeStatsHtml(){
  var s=computeHomeStats(),now=new Date(),h='';
  // Medicine reminders
  getPendingReminders().forEach(function(r){
    var med=r.medicine,slot=r.scheduledTime;
    var label=med.dose?med.name+' ('+med.dose+')':med.name;
    h+='<div style="background:rgba(168,85,247,0.1);border:2px solid #a855f7;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px">'
      +'<span style="font-size:1.3rem">💊</span>'
      +'<div style="flex:1"><div style="font-weight:700;font-size:0.9rem;color:#a855f7">Give '+label+'</div>'
      +'<div style="font-size:0.78rem;color:var(--muted)">Scheduled: '+slot+'</div></div>'
      +'<button onclick="markMedicineGiven(\''+med.id+'\',\''+slot+'\')" style="background:#a855f7;color:#fff;border:none;padding:6px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem">✓ Given</button>'
      +'</div>';
  });
  var ong=s.ong;
  if(ong){var dur=fmt(now-ong.startTime);var cls=ong.type==='sleep'?'':'feed';var st=ong.side?' ('+ong.side+')':'';
    h+='<div class="ongoing '+cls+'" onclick="openEnd(\''+ong.id+'\',\''+ong.type+'\')"><div class="em">'+(ong.type==='sleep'?'😴':'🍼')+'</div><div class="info"><div class="ot">'+(ong.type==='sleep'?'Sleeping':'Feeding'+st)+' now</div><div class="sub">'+dur+' · click to end</div></div><div>⏹</div></div>';}
  if(cfg.trackSleep){
    h+='<div class="stat"><div class="em">😴</div><div class="info"><div class="t">Sleep</div>';

function renderHistory(){
  var h='<div class="page-title">History</div>';
  h+='<div class="filters">';
  var types=[{k:'all',l:'All'}];
  if(cfg.trackSleep)types.push({k:'sleep',l:'😴 Sleep'});
  if(cfg.trackFeed)types.push({k:'feed',l:'🍼 Feed'});
  if(cfg.trackDiaper)types.push({k:'diaper',l:'🧷 Diaper'});
  if(cfg.trackPump)types.push({k:'pump',l:'🧴 Pump'});
  types.push({k:'medicine',l:'💊 Medicine'});
  types.forEach(function(f){h+='<span class="chip '+(typeF===f.k?'sel':'')+'" onclick="typeF=\''+f.k+'\';render()">'+f.l+'</span>'});
  h+='</div><div class="filters" style="margin-bottom:16px">';
  ['all','today','yesterday','2daysago','3daysago'].forEach(function(f){var lbl={all:'All time',today:'Today',yesterday:'Yesterday','2daysago':'2 days ago','3daysago':'3 days ago'}[f];
    h+='<span class="chip '+(timeF===f?'sel':'')+'" onclick="timeF=\''+f+'\';render()">'+lbl+'</span>'});
  h+='</div>';

  var evs=allEv.slice();
  if(typeF!=='all')evs=evs.filter(function(e){return e.type===typeF});
  var now=new Date(),today6=new Date(now.getFullYear(),now.getMonth(),now.getDate(),6,0,0);
  if(timeF==='today'){evs=evs.filter(function(e){return e.startTime>=today6})}
  else if(timeF==='yesterday'){var y6=new Date(today6.getTime()-864e5);evs=evs.filter(function(e){return e.startTime>=y6&&e.startTime<today6})}
  else if(timeF==='2daysago'){var d2=new Date(today6.getTime()-2*864e5);var d1=new Date(today6.getTime()-864e5);evs=evs.filter(function(e){return e.startTime>=d2&&e.startTime<d1})}
  else if(timeF==='3daysago'){var d3=new Date(today6.getTime()-3*864e5);var d2b=new Date(today6.getTime()-2*864e5);evs=evs.filter(function(e){return e.startTime>=d3&&e.startTime<d2b})}

  if(typeF==='medicine'){renderMedicineHistory();return;}
  var hasDur=typeF==='sleep'||typeF==='feed';
  function sumDur(arr){return arr.reduce(function(s,e){return s+(e.duration||0)},0)}

  var grouped={};
  evs.forEach(function(e){var dk2=dayLabel(e.startTime);var pk=getPeriod(e.startTime);
    if(!grouped[dk2])grouped[dk2]={};if(!grouped[dk2][pk])grouped[dk2][pk]=[];grouped[dk2][pk].push(e)});
  var dayKeys=Object.keys(grouped);
  if(!dayKeys.length){h+='<div style="text-align:center;padding:40px;color:var(--muted)">No events</div>';document.getElementById('main').innerHTML=h;return}

  dayKeys.forEach(function(dk2){var ps=grouped[dk2];
    var periods=Object.keys(ps).sort(function(a,b){return ps[b][0].startTime-ps[a][0].startTime});
    var total=Object.values(ps).reduce(function(s,a){return s+a.length},0);
    var dayDur=hasDur?sumDur(Object.values(ps).reduce(function(a,b){return a.concat(b)},[])):'';
    h+='<div class="day-hdr">'+dk2+(typeF!=='all'?' ('+total+(dayDur?' · '+fmtMin(dayDur):'')+')':'')+'</div>';
    periods.forEach(function(p){if(!ps[p])return;
      var pDur=hasDur?sumDur(ps[p]):'';
      h+='<div class="period-hdr">'+periodDisplay(p,ps[p])+(typeF!=='all'?' ('+ps[p].length+(pDur?' · '+fmtMin(pDur):'')+')':'')+'</div>';
      h+='<table class="ev-table">';
      ps[p].forEach(function(e){
        var time=pad(e.startTime.getHours())+':'+pad(e.startTime.getMinutes());
        var props=[];
        if(e.duration)props.push(fmtMin(e.duration));
        else if(e.endTime)props.push(fmt(e.endTime-e.startTime));
        else if((e.type==='sleep'||e.type==='feed')&&!e.endTime&&!e.duration)props.push('ongoing');
        if(e.side)props.push(e.side);
        if(e.source==='pump')props.push('pumped milk');
        if(e.mlFed)props.push(e.mlFed+'ml');
        if(e.type==='pump'){if(e.ml)props.push(e.ml+'ml');if(e.storage)props.push(e.storage);if(e.spoiled)props.push('⚠️ spoiled')}
        h+='<tr><td class="td-time">'+time+'</td><td><div class="td-event">'+displayName(e)+'</div>';
        if(props.length)h+='<div class="td-props">'+props.join(' · ')+'</div>';
        h+='</td><td class="td-acts"><button onclick="editEv(\''+e.id+'\')">✏️</button> <button class="del" onclick="delEv(\''+e.id+'\',\''+displayName(e).replace(/'/g,"\\'")+'\')">🗑</button></td></tr>'});
      h+='</table>'})});
  document.getElementById('main').innerHTML=h}

function renderPump(){
  var h='<div class="page-title">🧴 Pump & Stock</div>';
  var pumps=allEv.filter(function(e){return e.type==='pump'});
  var now=new Date();

  // Calculate stock: available pumps (not spoiled, not expired, with remaining ml)
  var feedsFromPump=allEv.filter(function(e){return e.type==='feed'&&e.source==='pump'});
  var usedMl={};feedsFromPump.forEach(function(f){
    if(f.linkedPumps){try{JSON.parse(f.linkedPumps).forEach(function(lp){usedMl[lp.id]=(usedMl[lp.id]||0)+lp.ml})}catch(e){}}
    else if(f.linkedPumpId){usedMl[f.linkedPumpId]=(usedMl[f.linkedPumpId]||0)+(f.mlFed||0)}
  });

  var stock={room:[],fridge:[],freezer:[]};
  pumps.forEach(function(p){
    if(p.spoiled)return;
    if(!p.ml)return;
    var remaining=p.ml-(usedMl[p.id]||0);
    if(remaining<=0)return;
    var expired=p.expiresAt&&p.expiresAt<now;
    if(expired)return;
    var st=p.storage||'room';
    if(stock[st])stock[st].push({id:p.id,ml:remaining,expires:p.expiresAt,pumpId:p.pumpId,startTime:p.startTime});
  });

  // 5-day avg pumped and used
  var d5=new Date(now-864e5*5);
  var pumps5d=pumps.filter(function(p){return p.startTime>=d5});
  var totalPumped5d=pumps5d.reduce(function(s,p){return s+(p.ml||0)},0);
  var avgPumped5d=totalPumped5d/5;
  var feeds5d=feedsFromPump.filter(function(f){return f.startTime>=d5});
  var totalUsed5d=feeds5d.reduce(function(s,f){
    var ml=f.mlFed||0;
    if(!ml&&f.linkedPumps){try{ml=JSON.parse(f.linkedPumps).reduce(function(s2,x){return s2+x.ml},0)}catch(e){}}
    return s+ml;
  },0);
  var avgUsed5d=totalUsed5d/5;

  // 1. Stock overview
  h+='<div class="stats-section"><div class="section-label">Stock Overview</div>';
  var storages=[{k:'room',l:'🏠 Room Temp',c:'4h'},{k:'fridge',l:'❄️ Fridge',c:'4 days'},{k:'freezer',l:'🧊 Freezer',c:'6 months'}];
  storages.forEach(function(s){
    var items=stock[s.k];var totalMl=items.reduce(function(sum,i){return sum+i.ml},0);
    h+='<div class="stock-card"><div class="sc-title">'+s.l+' (lasts '+s.c+')</div>';
    if(!items.length){h+='<div class="sc-row">No milk available</div>'}
    else{
      items.forEach(function(i){
        var idStr=i.pumpId?'#'+i.pumpId:'—';
        var pumpedStr=i.startTime?shortDate(i.startTime):'?';
        var expStr=i.expires?' · expires: '+shortDate(i.expires):'';
        h+='<div class="sc-row">'+idStr+' · pumped: '+pumpedStr+' · '+i.ml+'ml'+expStr+'</div>';
      });
    }
    h+='</div>';
  });
  h+='</div>';

  // 2. 5-day avg stats
  h+='<div class="section-label" style="margin-top:20px">5-Day Averages</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">';
  h+='<div class="stat" style="background:var(--card)"><div class="em">🥛</div><div class="info"><div class="t" style="color:var(--pump)">'+(avgPumped5d>0?Math.round(avgPumped5d)+'ml':'--')+'</div><div class="l">Avg pumped/day</div><div class="l2">5-day avg</div></div></div>';
  h+='<div class="stat" style="background:var(--card)"><div class="em">🍼</div><div class="info"><div class="t" style="color:var(--pump)">'+(avgUsed5d>0?Math.round(avgUsed5d)+'ml':'--')+'</div><div class="l">Avg used/day</div><div class="l2">5-day avg</div></div></div>';
  h+='</div>';

  // 3. Recently used pump milk (last 3 days)
  var d3=new Date(now-864e5*3);
  var pumpById={};pumps.forEach(function(p){pumpById[p.id]=p;});
  var recentUsage=[];
  feedsFromPump.filter(function(f){return f.startTime>=d3;}).forEach(function(f){
    if(f.linkedPumps){try{JSON.parse(f.linkedPumps).forEach(function(lp){
      var pump=pumpById[lp.id];
      recentUsage.push({feedTime:f.startTime,mlUsed:lp.ml,pumpId:pump&&pump.pumpId?pump.pumpId:null,pumpedAt:pump?pump.startTime:null,pumpedMl:pump?pump.ml:null});
    })}catch(e){}}
    else if(f.linkedPumpId){
      var pump2=pumpById[f.linkedPumpId];
      recentUsage.push({feedTime:f.startTime,mlUsed:f.mlFed||0,pumpId:pump2&&pump2.pumpId?pump2.pumpId:null,pumpedAt:pump2?pump2.startTime:null,pumpedMl:pump2?pump2.ml:null});
    }
  });
  recentUsage.sort(function(a,b){return b.feedTime-a.feedTime;});

  h+='<div class="section-label" style="margin-top:20px">Recently Used (last 3 days)</div>';
  if(!recentUsage.length){h+='<div style="color:var(--muted);font-size:0.88rem;padding:12px 0">No pump milk used in the last 3 days</div>';}
  else{
    h+='<div class="stats-section" style="padding:0">';
    recentUsage.forEach(function(u,i){
      var idStr=u.pumpId?'#'+u.pumpId:'—';
      var timeStr=shortDate(u.feedTime);
      h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;'+(i<recentUsage.length-1?'border-bottom:1px solid var(--border)':'')+'">'+
        '<span style="font-size:0.9rem;font-weight:700;min-width:50px">'+idStr+'</span>'+
        '<span style="flex:1;font-size:0.82rem;color:var(--muted)">'+(u.pumpedAt?'pumped: '+shortDate(u.pumpedAt):'')+(u.pumpedMl?' · '+u.pumpedMl+'ml':'')+'</span>'+
        '<span style="font-size:0.9rem;font-weight:600;color:var(--pump)">'+u.mlUsed+'ml used</span>'+
        '</div>';
    });
    h+='</div>';
  }

  document.getElementById('main').innerHTML=h;
}

function listenMedicines(){
  if(medUnsub)medUnsub();
  if(medGivenUnsub)medGivenUnsub();
  var since=new Date(Date.now()-30*864e5);
  medUnsub=db.collection('families').doc(fid).collection('medicines')
    .where('active','==',true)
    .onSnapshot(function(s){
      allMedicines=[];
      s.forEach(function(d){try{var data=d.data();allMedicines.push(Object.assign({id:d.id},data));}catch(e){}});
      if(tab==='medicine')renderMedicine();
      if(tab==='home')renderHomeStats();
    });
  medGivenUnsub=db.collection('families').doc(fid).collection('medicineGiven')
    .where('givenAt','>=',firebase.firestore.Timestamp.fromDate(since))
    .orderBy('givenAt','desc')
    .onSnapshot(function(s){
      allMedicineGiven=[];
      s.forEach(function(d){try{var data=d.data();allMedicineGiven.push(Object.assign({id:d.id},data,{givenAt:data.givenAt.toDate()}));}catch(e){}});
      if(tab==='medicine')renderMedicine();
      if(tab==='home')renderHomeStats();
    });
}

function getPendingReminders(){
  var now=new Date(),pending=[];
  var todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var givenToday=allMedicineGiven.filter(function(g){return g.givenAt>=todayStart;});
  allMedicines.forEach(function(med){
    if(med.scheduleType==='asNeeded')return;
    if(med.scheduleType==='specificDays'){
      var dow=(now.getDay()+6)%7; // 0=Mon
      if(!med.daysOfWeek||!med.daysOfWeek.includes(dow))return;
    }
    (med.timesOfDay||[]).forEach(function(slot){
      var parts=slot.split(':'),slotH=+parts[0],slotM=+parts[1];
      var slotTime=new Date(now.getFullYear(),now.getMonth(),now.getDate(),slotH,slotM);
      if(now<new Date(slotTime-15*60000))return; // not yet within 15min window
      var alreadyGiven=givenToday.some(function(g){return g.medicineId===med.id&&g.scheduledTime===slot;});
      if(!alreadyGiven)pending.push({medicine:med,scheduledTime:slot});
    });
  });
  return pending;
}

function markMedicineGiven(medId,slot){
  var med=allMedicines.find(function(m){return m.id===medId;});
  if(!med)return;
  db.collection('families').doc(fid).collection('medicineGiven').add({
    medicineId:medId,medicineName:med.name,dose:med.dose||null,
    givenAt:firebase.firestore.Timestamp.now(),givenBy:'web',
    scheduledTime:slot||null
  }).then(function(){showSnack('💊 '+med.name+' marked as given');});
}

      var label=g.medicineName+(g.dose?' · '+g.dose:'');
      var slotStr=g.scheduledTime?' · sched: '+g.scheduledTime:'';
      h+='<tr><td class="td-time">'+date+'<br>'+time+'</td><td><div class="td-event">💊 '+label+'</div>'
        +'<div class="td-props">given'+slotStr+'</div></td></tr>';
    });
    h+='</table>';
  }

  document.getElementById('main').innerHTML=h;
}

function scheduleDescription(med){
  if(med.scheduleType==='asNeeded')return 'As needed';
  if(med.scheduleType==='onceDailyAt')return 'Once daily at '+(med.timesOfDay||['?'])[0];
  if(med.scheduleType==='customTimes')return (med.timesOfDay||[]).length+'× daily at '+(med.timesOfDay||[]).join(', ');
  if(med.scheduleType==='specificDays'){
    var days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    var dStr=(med.daysOfWeek||[]).map(function(d){return days[d%7];}).join(', ');
    return dStr+' at '+(med.timesOfDay||[]).join(', ');
  }
  return '';
}

var tc='#a1a1aa',gc2='rgba(63,63,70,0.5)';
function dcx(id){if(charts[id]){charts[id].destroy();delete charts[id]}}
function drawDaily(id,evs,cutoff,now,color){dcx(id);var d={};for(var t=new Date(cutoff);t<=now;t.setDate(t.getDate()+1))d[dkey(t)]=0;
  evs.forEach(function(e){var k=dkey(e.startTime);if(d[k]!==undefined)d[k]+=(e.duration||0)});
  charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:Object.keys(d).map(sdate),datasets:[{data:Object.values(d).map(function(m){return+(m/60).toFixed(1)}),backgroundColor:color,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:tc,callback:function(v){return v+'h'}},grid:{color:gc2}},x:{ticks:{color:tc,maxRotation:45},grid:{display:false}}}}})}
function draw24h(id,evs){dcx(id);var bk=new Array(48).fill(0);var td=Math.max(new Set(evs.map(function(e){return dkey(e.startTime)})).size,1);
  evs.forEach(function(e){if(!e.duration)return;var t=new Date(e.startTime);var end=new Date(t.getTime()+e.duration*60000);
    while(t<end){bk[t.getHours()*2+(t.getMinutes()>=30?1:0)]++;t=new Date(t.getTime()+1800000)}});
  var pct=bk.map(function(b){return Math.min(100,Math.round(b/td*100))});
  var labels=[];for(var i=0;i<48;i++){var hh=Math.floor(i/2);labels.push(i%2===0?hh.toString().padStart(2,'0')+':00':'')}
  var colors=pct.map(function(_,i){var hh=Math.floor(i/2);return(hh>=19||hh<7)?'rgba(99,102,241,0.7)':'rgba(251,191,36,0.7)'});
  charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:[{data:pct,backgroundColor:colors,borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,ticks:{color:tc},grid:{color:gc2}},x:{ticks:{color:tc,maxRotation:0,autoSkipPadding:10},grid:{display:false}}}}})}
function drawND(id,evs,cutoff,now){dcx(id);var dn={},dd={};for(var t=new Date(cutoff);t<=now;t.setDate(t.getDate()+1)){var k=dkey(t);dn[k]=0;dd[k]=0}
  evs.forEach(function(e){if(!e.duration)return;var k=dkey(e.startTime);if(dn[k]===undefined)return;
    var st=new Date(e.startTime),en=new Date(st.getTime()+e.duration*60000),tt=new Date(st);
    while(tt<en){var hh=tt.getHours(),isN=hh>=19||hh<7;var nx=new Date(tt);if(hh>=7&&hh<19)nx.setHours(19,0,0,0);else if(hh>=19){nx.setDate(nx.getDate()+1);nx.setHours(7,0,0,0)}else nx.setHours(7,0,0,0);
      if(nx>en)nx=en;var c=(nx-tt)/60000;if(isN)dn[k]+=c;else dd[k]+=c;tt=nx}});
  charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:Object.keys(dn).map(sdate),datasets:[
    {label:'Night',data:Object.values(dn).map(function(m){return+(m/60).toFixed(1)}),backgroundColor:'rgba(99,102,241,0.7)',borderRadius:2},
    {label:'Day',data:Object.values(dd).map(function(m){return+(m/60).toFixed(1)}),backgroundColor:'rgba(251,191,36,0.7)',borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc}}},scales:{y:{stacked:true,beginAtZero:true,ticks:{color:tc,callback:function(v){return v+'h'}},grid:{color:gc2}},x:{stacked:true,ticks:{color:tc,maxRotation:45},grid:{display:false}}}}})}

// ==================== FEED TAB ====================
function renderFeedTab(){
  var h='<div class="page-title">🍼 Feed Insights</div>';
  var now=new Date();
  var feeds=allEv.filter(function(e){return e.type==='feed'});

  // Time since last feed
  var lastFeed=feeds[0];
  if(lastFeed){var endT=lastFeed.endTime||lastFeed.startTime;h+='<div class="stat" style="background:var(--card)"><div class="em">⏱</div><div class="info"><div class="t" style="color:var(--feed)">'+fmt(now-endT)+'</div><div class="l">Time since last feed</div></div></div>';
  }

  // Smart side recommendation (same logic as quick stats)
  var recSide2=null,recReason2=null;
  var breastFeeds2=feeds.filter(function(f){return f.source!=='pump'&&f.side});
  var recentPumps2=allEv.filter(function(e){return e.type==='pump'&&e.side&&e.side!=='both'}).slice(0,5);
  var lastBF2=breastFeeds2[0];
  if(lastBF2){
    var ls2=lastBF2.side;var os2=ls2==='left'?'right':'left';
    var le2=lastBF2.endTime||lastBF2.startTime;
    var ms2=Math.round((Date.now()-le2.getTime())/60000);
    var dur2=lastBF2.duration||null;
    var ps2=recentPumps2.filter(function(p){return p.startTime>le2&&p.side!=='both'});
    if(ms2>120){if(ps2.length){var psd=ps2[0].side;recSide2=psd==='left'?'right':'left';recReason2=psd+' pumped since last feed — other side fuller'}else{recSide2=os2;recReason2=Math.floor(ms2/60)+'h+ gap — alternate to '+os2}}
    else if(dur2!==null&&dur2<5){recSide2=ls2;recReason2='Last feed very short ('+dur2+'m) — offer '+ls2+' again for hindmilk'}
    else if(dur2!==null&&dur2<10){recSide2=ls2;recReason2='Last feed short ('+dur2+'m) — offer '+ls2+' again'}
    else if(ps2.length){var psd2=ps2[0].side;recSide2=psd2==='left'?'right':'left';recReason2=psd2+' was pumped — other side fuller'}
    else{recSide2=os2;recReason2='Alternating — last was '+ls2+(dur2?' ('+dur2+'m)':'')}
  }else if(recentPumps2.length){var psd3=recentPumps2[0].side;recSide2=psd3==='left'?'right':'left';recReason2='Recently pumped '+psd3+' — other side fuller'}
  if(recSide2){
    h+='<div style="background:var(--feeddim);border:2px solid var(--feed);border-radius:12px;padding:16px;margin:10px 0"><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:1.5rem">🤱</span><span style="font-weight:700;font-size:1.2rem;color:var(--feed)">Next side: '+recSide2.toUpperCase()+'</span></div><div style="font-size:0.85rem;color:var(--muted)">'+recReason2+'</div></div>';
  }

  // Last 24h stats
  function feedMinEquiv(f){
    if(f.duration)return f.duration;
    var ml=f.mlFed||0;
    if(!ml&&f.linkedPumps){try{ml=JSON.parse(f.linkedPumps).reduce(function(s,x){return s+x.ml},0)}catch(e){}}
    if(ml>0)return ml/2;
    return 0;
  }
  var last24h=new Date(now-864e5);
  var feeds24h=feeds.filter(function(f){return f.startTime>=last24h});
  var d5=new Date(now-864e5*5); // 5 days
  var feeds5d=feeds.filter(function(f){return f.startTime>=d5});
  var equiv24h=feeds24h.reduce(function(s,f){return s+feedMinEquiv(f)},0);
  var avg5dEquiv=feeds5d.length?feeds5d.reduce(function(s,f){return s+feedMinEquiv(f)},0)/5:0;
  var dur24h=feeds24h.reduce(function(s,f){return s+(f.duration||0)},0);
  var ml24h=feeds24h.reduce(function(s,f){
    var ml=f.mlFed||0;if(!ml&&f.linkedPumps){try{ml=JSON.parse(f.linkedPumps).reduce(function(s2,x){return s2+x.ml},0)}catch(e){}}return s+ml;
  },0);
  var parts24h=[];
  if(dur24h>0)parts24h.push(fmtMin(dur24h)+' breast');
  if(ml24h>0)parts24h.push(ml24h+'ml pumped');
  var str24h=parts24h.length?parts24h.join(' + '):'No feeds yet';
  h+='<div class="stat" style="background:var(--card)"><div class="em">📊</div><div class="info"><div class="t">Last 24h</div>';
  h+='<div class="l" style="color:var(--feed);font-weight:600">'+str24h+'</div>';
  if(avg5dEquiv>0){h+='<div class="l2">5-day avg: ~'+fmtMin(Math.round(avg5dEquiv))+'/day</div>';
    h+=compLabel(equiv24h,avg5dEquiv,'feeding');}
  h+='</div></div>';

  // Avg duration, day gap, night gap (5-day)
  var breastFeeds5d=feeds5d.filter(function(f){return f.source!=='pump'&&f.duration&&f.duration>0});
  var avgDur=breastFeeds5d.length?breastFeeds5d.reduce(function(s,f){return s+f.duration},0)/breastFeeds5d.length:0;
  // Gap: sort ALL 5d feeds, compute gaps between consecutive pairs,
  // Group feeds into sessions (gap <= 30min = same session).
  // Inter-session gap = end of session to start of next.
  function buildSessions(sorted){
    if(!sorted.length)return [];
    var sessions=[];
    var sStart=sorted[0].startTime,sEnd=sorted[0].endTime||sorted[0].startTime;
    for(var i=1;i<sorted.length;i++){
      var f=sorted[i],fEnd=f.endTime||f.startTime;
      var gap=Math.round((f.startTime-sEnd)/60000);
      if(gap<=30){if(fEnd>sEnd)sEnd=fEnd;}
      else{sessions.push({start:sStart,end:sEnd});sStart=f.startTime;sEnd=fEnd;}
    }
    sessions.push({start:sStart,end:sEnd});
    return sessions;
  }
  function avgSessionGapInWindow(sessions, inWindow){
    if(sessions.length<2)return 0;
    var gaps=[];
    for(var i=1;i<sessions.length;i++){
      var prevEnd=sessions[i-1].end,currStart=sessions[i].start;
      var h=sessions[i-1].start.getHours();
      if(!inWindow(h))continue;
      var g=Math.round((currStart-prevEnd)/60000);
      if(g>=5&&g<720)gaps.push(g);
    }
    return gaps.length?gaps.reduce(function(s,v){return s+v},0)/gaps.length:0;
  }
  var allSorted5d=feeds5d.slice().sort(function(a,b){return a.startTime-b.startTime});
  var sessions5d=buildSessions(allSorted5d);
  var gapDay=avgSessionGapInWindow(sessions5d,function(h){return h>=10&&h<22;});
  var gapNight=avgSessionGapInWindow(sessions5d,function(h){return h>=22||h<10;});
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px">';
  h+='<div class="stat" style="background:var(--card)"><div class="em">⏱</div><div class="info"><div class="t" style="color:var(--feed)">'+(avgDur>0?fmtMin(Math.round(avgDur)):'--')+'</div><div class="l">Avg duration</div><div class="l2">5d · breast</div></div></div>';
  h+='<div class="stat" style="background:var(--card)"><div class="em">☀️</div><div class="info"><div class="t" style="color:var(--feed)">'+(gapDay>0?fmtMin(Math.round(gapDay)):'--')+'</div><div class="l">Avg gap day</div><div class="l2">10am–10pm · 5d</div></div></div>';
  h+='<div class="stat" style="background:var(--card)"><div class="em">🌙</div><div class="info"><div class="t" style="color:var(--feed)">'+(gapNight>0?fmtMin(Math.round(gapNight)):'--')+'</div><div class="l">Avg gap night</div><div class="l2">10pm–10am · 5d</div></div></div>';
  h+='</div>';

  // Left/right balance (7-day)
  var d7=new Date(now-604800000);
  var feeds7d=feeds.filter(function(f){return f.startTime>=d7&&f.side});
  var leftF=feeds7d.filter(function(f){return f.side==='left'}).length;
  var rightF=feeds7d.filter(function(f){return f.side==='right'}).length;
  var totalSided=leftF+rightF;
  if(totalSided>0){var lp=Math.round(leftF/totalSided*100);
    h+='<div class="stat" style="background:var(--card)"><div class="em">🤱</div><div class="info"><div class="t" style="color:var(--purple)">'+lp+'% / '+(100-lp)+'%</div><div class="l">Left: '+leftF+' · Right: '+rightF+' (7-day) '+(Math.abs(lp-50)<15?'✓ Balanced':'⚠ Consider alternating')+'</div></div></div>';
  }

  // Recent feed history

  document.getElementById('main').innerHTML=h;
}

function getPeriodName(d){var h=d.getHours();if(h>=0&&h<6)return 'Night';if(h>=6&&h<12)return 'Morning';if(h>=12&&h<18)return 'Afternoon';return 'Evening'}
function getPeriodStart(d){var h=d.getHours();if(h>=0&&h<6)return new Date(d.getFullYear(),d.getMonth(),d.getDate(),0);
  if(h>=6&&h<12)return new Date(d.getFullYear(),d.getMonth(),d.getDate(),6);
  if(h>=12&&h<18)return new Date(d.getFullYear(),d.getMonth(),d.getDate(),12);
  return new Date(d.getFullYear(),d.getMonth(),d.getDate(),18)}
function compLabel(current,avg,noun){
  if(avg<=0)return '';
  var pct=(current-avg)/avg;
  if(pct>0.20){var p=Math.round(pct*100);return '<div style="display:inline-block;background:rgba(245,158,11,0.15);color:#f59e0b;font-weight:600;font-size:0.78rem;padding:3px 10px;border-radius:8px;margin-top:4px">📈 '+p+'% more '+noun+' than usual</div> '}
  if(pct<-0.20){var p2=Math.round(Math.abs(pct)*100);return '<div style="display:inline-block;background:rgba(59,130,246,0.15);color:#3b82f6;font-weight:600;font-size:0.78rem;padding:3px 10px;border-radius:8px;margin-top:4px">📉 '+p2+'% less '+noun+' than usual</div> '}
  return '<div style="display:inline-block;background:rgba(34,197,94,0.15);color:#22c55e;font-weight:600;font-size:0.78rem;padding:3px 10px;border-radius:8px;margin-top:4px">✅ About the same as usual</div> '}

// ==================== SLEEP TAB ====================
function renderSleepTab(){
  var h='<div class="page-title">😴 Sleep Insights</div>';
  var now=new Date();
  var sleeps=allEv.filter(function(e){return e.type==='sleep'});

  // Time since last sleep
  var lastSleep=sleeps[0];
  if(lastSleep){var endT=lastSleep.endTime||lastSleep.startTime;
    h+='<div class="stat" style="background:var(--card)"><div class="em">⏱</div><div class="info"><div class="t" style="color:var(--sleep)">'+fmt(now-endT)+'</div><div class="l">'+(lastSleep.endTime?'Awake for':'Since last sleep')+'</div></div></div>';
  }

  // Today stats
  var today6=new Date(now.getFullYear(),now.getMonth(),now.getDate(),6,0,0);
  var sleepsToday=sleeps.filter(function(f){return f.startTime>=today6});
  var durToday=sleepsToday.reduce(function(s,f){return s+(f.duration||0)},0);
  h+='<div class="stat" style="background:var(--card)"><div class="em">📊</div><div class="info"><div class="t">Today</div><div class="l">'+sleepsToday.length+' naps · '+fmtMin(durToday)+' total sleep</div></div></div>';

  // 7-day stats
  var d7=new Date(now-604800000);
  var sleeps7d=sleeps.filter(function(e){return e.startTime>=d7&&e.duration});
  var totalMin7d=sleeps7d.reduce(function(s,e){return s+(e.duration||0)},0);
  h+='<div class="stat" style="background:var(--card)"><div class="em">📈</div><div class="info"><div class="t">7-Day Average</div><div class="l">'+fmtMin(totalMin7d/7)+'/day · '+(sleeps7d.length/7).toFixed(1)+' naps/day · avg '+fmtMin(sleeps7d.length?totalMin7d/sleeps7d.length:0)+' each</div></div></div>';

  // Charts
  h+='<div class="stat" style="background:var(--card);padding:20px;margin:16px 0"><div class="t" style="margin-bottom:12px">🕐 When Does Yuli Sleep?</div><canvas id="stc1" style="max-height:250px"></canvas></div>';
  h+='<div class="stat" style="background:var(--card);padding:20px;margin-bottom:16px"><div class="t" style="margin-bottom:12px">🌙 Night vs Day Sleep</div><canvas id="stc2" style="max-height:250px"></canvas></div>';

  // Recent history

  document.getElementById('main').innerHTML=h;
  setTimeout(function(){var cutoff=new Date(now-604800000);draw24h('stc1',sleeps7d);drawND('stc2',sleeps7d,cutoff,now)},50);
}

// ==================== DIAPER TAB ====================
function renderDiaperTab(){
  var h='<div class="page-title">🧷 Diaper Insights</div>';
  var now=new Date();
  var diapers=allEv.filter(function(e){return e.type==='diaper'});

  // Last diaper
  var lastD=diapers[0];
  if(lastD){var w=lastD.pee&&lastD.poop?'pee+poop':lastD.poop?'poop':'pee';
    h+='<div class="stat" style="background:var(--card)"><div class="em">⏱</div><div class="info"><div class="t" style="color:var(--diaper)">'+fmt(now-lastD.startTime)+'</div><div class="l">Since last diaper ('+w+')</div></div></div>';
  }

  // Last 24h vs 5-day avg
  var last24h=new Date(now-864e5);
  var d24count=diapers.filter(function(e){return e.startTime>=last24h}).length;
  var d5=new Date(now-864e5*5);
  var d5d=diapers.filter(function(e){return e.startTime>=d5}).length;
  var avg5d=d5d/5;
  h+='<div class="stat" style="background:var(--card)"><div class="em">📊</div><div class="info"><div class="t">Last 24h</div>';
  h+='<div class="l" style="color:var(--diaper);font-weight:600">'+d24count+' diapers</div>';
  if(avg5d>0){h+='<div class="l2">5-day avg: '+avg5d.toFixed(1)+'/day</div>';h+=compLabel(d24count,avg5d,'diapers');}
  h+='</div></div>';

  // 5-day avg per period
  var periods=['Night','Morning','Afternoon','Evening'];
  var periodAvgs=periods.map(function(p){
    var count=diapers.filter(function(e){return e.startTime>=d5&&getPeriodName(e.startTime)===p}).length;
    return {name:p,avg:(count/5).toFixed(1)};
  });
  h+='<div class="stat" style="background:var(--card)"><div class="em">🕐</div><div class="info"><div class="t">5-Day Avg by Period</div>';
  h+='<div class="l">'+periodAvgs.map(function(p){
    var em={Night:'🌙',Morning:'🌅',Afternoon:'☀️',Evening:'🌇'}[p.name];
    return em+' '+p.name+': '+p.avg;
  }).join(' · ')+'</div></div></div>';

  // Recent history

  document.getElementById('main').innerHTML=h;
}

// Mini history for tab views
function renderMiniHistory(evs){
  if(!evs.length)return '<div style="text-align:center;padding:20px;color:var(--muted)">No events</div>';
  var h='<table class="ev-table">';
  evs.forEach(function(e){
    var time=pad(e.startTime.getHours())+':'+pad(e.startTime.getMinutes());
    var date=pad(e.startTime.getDate())+'/'+pad(e.startTime.getMonth()+1);
    var props=[];
    if(e.duration)props.push(fmtMin(e.duration));
    else if(e.endTime)props.push(fmt(e.endTime-e.startTime));
    else if((e.type==='sleep'||e.type==='feed')&&!e.endTime&&!e.duration)props.push('ongoing');
    if(e.side)props.push(e.side);
    if(e.source==='pump')props.push('pumped milk');
    if(e.mlFed)props.push(e.mlFed+'ml');
    if(e.type==='pump'){if(e.ml)props.push(e.ml+'ml');if(e.storage)props.push(e.storage);if(e.spoiled)props.push('⚠️ spoiled')}
    h+='<tr><td class="td-time">'+date+'<br>'+time+'</td><td><div class="td-event">'+displayName(e)+'</div>';
    if(props.length)h+='<div class="td-props">'+props.join(' · ')+'</div>';
    h+='</td><td class="td-acts"><button onclick="editEv(\''+e.id+'\')">✏️</button> <button class="del" onclick="delEv(\''+e.id+'\',\''+displayName(e).replace(/'/g,"\\'")+'\')">🗑</button></td></tr>'});
  h+='</table>';return h}

function exportCSV(){if(!allEv.length){alert('No data');return}var now=new Date(),cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-rd);
  var filt=allEv.filter(function(e){return e.startTime>=cutoff}).sort(function(a,b){return a.startTime-b.startTime});
  var csv='Date,Time,Type,Duration,Side,Pee,Poop,ML,Storage,Source\n';filt.forEach(function(e){var d=e.startTime;
    csv+=dkey(d)+','+pad(d.getHours())+':'+pad(d.getMinutes())+','+e.type+','+(e.duration||'')+','+(e.side||'')+','+(e.pee||false)+','+(e.poop||false)+','+(e.ml||'')+','+(e.storage||'')+','+(e.source||'')+'\n'});
  var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);var a=document.createElement('a');
  a.href=url;a.download='yuli-'+rd+'d.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}

// ==================== LOG WIZARD ====================
var wiz={step:0,type:'',when:new Date(),durMin:null,ongoing:false,side:null,pee:false,poop:false,isNow:true,endId:null,endEv:null,whenMins:0,
  source:null,linkedPumpId:null,linkedPumps:null,mlFed:null,ml:null,storage:null,selectedPumps:{},adHocMl:null};
function resetWiz(type){wiz={step:0,type:type,when:new Date(),durMin:null,ongoing:false,side:null,pee:false,poop:false,isNow:true,endId:null,endEv:null,whenMins:0,
  source:null,linkedPumpId:null,linkedPumps:null,mlFed:null,ml:null,storage:null,selectedPumps:{},adHocMl:null}}

function openLog(type){var ong=findOngoing();
  if(type==='pump'){resetWiz('pump');showWiz();return}
  if(type==='feed'&&!ong){resetWiz('feed');wiz.step=30;showWiz();return}
  if(type==='diaper'){resetWiz('diaper');wiz.step=31;showWiz();return}
  if(ong&&ong.type===type){resetWiz(type);wiz.step=1;wiz.when=ong.startTime;wiz.side=ong.side;wiz.endId=ong.id;wiz.endEv=ong;wiz.isNow=false;showWiz();return}
  resetWiz(type);showWiz()}
function openEnd(id,type){var ong=allEv.find(function(e){return e.id===id});if(!ong)return;resetWiz(type);wiz.step=1;wiz.when=ong.startTime;wiz.side=ong.side;wiz.endId=id;wiz.endEv=ong;wiz.isNow=false;showWiz()}

function showWiz(){var em={sleep:'😴',feed:'🍼',diaper:'🧷',pump:'🧴'},nm={sleep:'Sleep',feed:'Feed',diaper:'Diaper Change',pump:'Pump'};
  var title=(wiz.endId?'End ':'Log ')+nm[wiz.type];
  var h='<div class="modal-bg" onclick="if(event.target===this)closeWiz()"><div class="modal"><h3>'+em[wiz.type]+' '+title+'</h3>';
  if(wiz.type==='pump'){h+=wizPump()}
  else if(wiz.type==='feed'&&wiz.step===30){h+=wizFeed()}
  else if(wiz.type==='diaper'&&wiz.step===31){h+=wizDiaperFull()}
  else if(wiz.step===0)h+=wizWhen();
  else if(wiz.step===1)h+=wizDur();
  else if(wiz.step===2)h+=wizDiaper();
  else if(wiz.step===3)h+=wizSide();
  h+='</div></div>';document.getElementById('modal-root').innerHTML=h}

function wizWhen(){var h='<div class="step-label">When did this happen?</div><div class="opts">';
  h+='<div class="opt '+(wiz.isNow&&wiz.whenMins===0?'sel':'')+'" onclick="wizSetWhen(0)">Now</div>';
  h+='<div class="opt '+(wiz.whenMins===15?'sel':'')+'" onclick="wizSetWhen(15)">15m ago</div>';
  h+='<div class="opt '+(wiz.whenMins===30?'sel':'')+'" onclick="wizSetWhen(30)">30m ago</div>';
  h+='<div class="opt '+(wiz.whenMins===60?'sel':'')+'" onclick="wizSetWhen(60)">1h ago</div></div>';
  h+='<div class="custom-row"><label>Or pick a time:</label><input type="datetime-local" id="wiz-c" value="'+dtLocal(wiz.when)+'" onchange="wizSetCustom(this.value)"/></div>';
  if(wiz.isNow&&wiz.type!=='diaper')h+='<div class="step-sub" style="color:var(--feed)">Will be logged as ongoing</div>';
  var nl=wiz.isNow&&wiz.type!=='diaper'&&wiz.type!=='feed'?'Save':'Next';
  h+='<div class="btn-row"><button class="btn-cancel" onclick="closeWiz()">Cancel</button><button class="btn-save" onclick="wizNext()">'+nl+'</button></div>';return h}

function wizDur(){var isSl=wiz.type==='sleep';
  var opts=isSl?[[30,'30m'],[60,'1h'],[120,'2h'],[180,'3h']]:[[10,'10m'],[15,'15m'],[20,'20m'],[30,'30m']];
  var h='<div class="step-label">How long?</div><div class="step-sub">Started at '+pad(wiz.when.getHours())+':'+pad(wiz.when.getMinutes())+'</div><div class="opts">';
  if(wiz.endId){var en=Math.round((Date.now()-wiz.when.getTime())/60000);h+='<div class="opt '+(wiz.durMin===en?'sel-r':'')+'" onclick="wiz.durMin='+en+';wiz.ongoing=false;showWiz()">⏹ End now ('+en+'m)</div>'}
  opts.forEach(function(o){h+='<div class="opt '+(wiz.durMin===o[0]&&!wiz.ongoing?'sel':'')+'" onclick="wiz.durMin='+o[0]+';wiz.ongoing=false;showWiz()">'+o[1]+'</div>'});
  if(!wiz.endId)h+='<div class="opt '+(wiz.ongoing?'sel-o':'')+'" onclick="wiz.ongoing=true;wiz.durMin=null;showWiz()">⏱ Still ongoing</div>';
  h+='</div><div class="custom-row"><label>Custom (minutes):</label><input type="number" placeholder="e.g. 45" onchange="wiz.durMin=+this.value;wiz.ongoing=false;showWiz()"/></div>';
  var nl=wiz.type==='feed'?'Next':'Save';
  h+='<div class="btn-row"><button class="btn-cancel" onclick="closeWiz()">Cancel</button><button class="btn-save" onclick="wizNext()">'+nl+'</button></div>';return h}

  h+='<div class="opt '+(wiz.whenMins===15?'sel':'')+'" onclick="wizSetWhen(15)">15m ago</div>';

  h+='<div class="step-label" style="margin-top:14px">What was in the diaper?</div><div class="opts">';

function wizDiaper(){var h='<div class="step-label">What was in the diaper?</div><div class="opts">';
  h+='<div class="opt '+(wiz.pee?'sel':'')+'" onclick="wiz.pee=!wiz.pee;showWiz()">💧 Pee</div>';

function wizSide(){var h='<div class="step-label">Which side? (optional)</div><div class="opts">';
  h+='<div class="opt '+(wiz.side==='left'?'sel':'')+'" onclick="wiz.side=wiz.side===\'left\'?null:\'left\';showWiz()">🤱 Left</div>';
