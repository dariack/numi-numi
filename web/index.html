  h+='<div class="stat" style="background:var(--card)"><div class="em">📊</div><div class="info"><div class="t">Last 24h</div>';
  h+='<div class="l" style="color:var(--feed);font-weight:600">'+str24h+'</div>';
  if(avg5dEquiv>0){h+='<div class="l2">5-day avg: ~'+fmtMin(Math.round(avg5dEquiv))+'/day</div>';
    h+=compLabel(equiv24h,avg5dEquiv,'feeding');}
  h+='</div></div>';

  // Avg duration, day gap, night gap (5-day)
  var breastFeeds5d=feeds5d.filter(function(f){return f.source!=='pump'&&f.duration&&f.duration>0});
  var avgDur=breastFeeds5d.length?breastFeeds5d.reduce(function(s,f){return s+f.duration},0)/breastFeeds5d.length:0;
  // Gap: sort ALL 5d feeds, compute gaps between consecutive pairs,
  // Group feeds into sessions (gap <= 30min = same session).
  // Inter-session gap = end of session to start of next.
  function buildSessions(sorted){
    if(!sorted.length)return [];
    var sessions=[];
    var sStart=sorted[0].startTime,sEnd=sorted[0].endTime||sorted[0].startTime;
    for(var i=1;i<sorted.length;i++){
      var f=sorted[i],fEnd=f.endTime||f.startTime;
      var gap=Math.round((f.startTime-sEnd)/60000);
      if(gap<=30){if(fEnd>sEnd)sEnd=fEnd;}
      else{sessions.push({start:sStart,end:sEnd});sStart=f.startTime;sEnd=fEnd;}
    }
    sessions.push({start:sStart,end:sEnd});
    return sessions;
  }
  function avgSessionGapInWindow(sessions, inWindow){
    if(sessions.length<2)return 0;
    var gaps=[];
    for(var i=1;i<sessions.length;i++){
      var prevEnd=sessions[i-1].end,currStart=sessions[i].start;
      var h=sessions[i-1].start.getHours();
      if(!inWindow(h))continue;
      var g=Math.round((currStart-prevEnd)/60000);
      if(g>=5&&g<720)gaps.push(g);
    }
    return gaps.length?gaps.reduce(function(s,v){return s+v},0)/gaps.length:0;
  }
  var allSorted5d=feeds5d.slice().sort(function(a,b){return a.startTime-b.startTime});
  var sessions5d=buildSessions(allSorted5d);
  var gapDay=avgSessionGapInWindow(sessions5d,function(h){return h>=10&&h<22;});
  var gapNight=avgSessionGapInWindow(sessions5d,function(h){return h>=22||h<10;});
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px">';
  h+='<div class="stat" style="background:var(--card)"><div class="em">⏱</div><div class="info"><div class="t" style="color:var(--feed)">'+(avgDur>0?fmtMin(Math.round(avgDur)):'--')+'</div><div class="l">Avg duration</div><div class="l2">5d · breast</div></div></div>';
  h+='<div class="stat" style="background:var(--card)"><div class="em">☀️</div><div class="info"><div class="t" style="color:var(--feed)">'+(gapDay>0?fmtMin(Math.round(gapDay)):'--')+'</div><div class="l">Avg gap day</div><div class="l2">10am–10pm · 5d</div></div></div>';
  h+='<div class="stat" style="background:var(--card)"><div class="em">🌙</div><div class="info"><div class="t" style="color:var(--feed)">'+(gapNight>0?fmtMin(Math.round(gapNight)):'--')+'</div><div class="l">Avg gap night</div><div class="l2">10pm–10am · 5d</div></div></div>';
  h+='</div>';

  // Left/right balance (7-day)
  var d7=new Date(now-604800000);
  var feeds7d=feeds.filter(function(f){return f.startTime>=d7&&f.side});
  var leftF=feeds7d.filter(function(f){return f.side==='left'}).length;
  var rightF=feeds7d.filter(function(f){return f.side==='right'}).length;
  var totalSided=leftF+rightF;
  if(totalSided>0){var lp=Math.round(leftF/totalSided*100);
    h+='<div class="stat" style="background:var(--card)"><div class="em">🤱</div><div class="info"><div class="t" style="color:var(--purple)">'+lp+'% / '+(100-lp)+'%</div><div class="l">Left: '+leftF+' · Right: '+rightF+' (7-day) '+(Math.abs(lp-50)<15?'✓ Balanced':'⚠ Consider alternating')+'</div></div></div>';
  }

  // Recent feed history

  document.getElementById('main').innerHTML=h;
}

function getPeriodName(d){var h=d.getHours();if(h>=0&&h<6)return 'Night';if(h>=6&&h<12)return 'Morning';if(h>=12&&h<18)return 'Afternoon';return 'Evening'}
function getPeriodStart(d){var h=d.getHours();if(h>=0&&h<6)return new Date(d.getFullYear(),d.getMonth(),d.getDate(),0);
  if(h>=6&&h<12)return new Date(d.getFullYear(),d.getMonth(),d.getDate(),6);
  if(h>=12&&h<18)return new Date(d.getFullYear(),d.getMonth(),d.getDate(),12);
  return new Date(d.getFullYear(),d.getMonth(),d.getDate(),18)}
function compLabel(current,avg,noun){
  if(avg<=0)return '';
  var pct=(current-avg)/avg;
  if(pct>0.20){var p=Math.round(pct*100);return '<div style="display:inline-block;background:rgba(245,158,11,0.15);color:#f59e0b;font-weight:600;font-size:0.78rem;padding:3px 10px;border-radius:8px;margin-top:4px">📈 '+p+'% more '+noun+' than usual</div> '}
  if(pct<-0.20){var p2=Math.round(Math.abs(pct)*100);return '<div style="display:inline-block;background:rgba(59,130,246,0.15);color:#3b82f6;font-weight:600;font-size:0.78rem;padding:3px 10px;border-radius:8px;margin-top:4px">📉 '+p2+'% less '+noun+' than usual</div> '}
  return '<div style="display:inline-block;background:rgba(34,197,94,0.15);color:#22c55e;font-weight:600;font-size:0.78rem;padding:3px 10px;border-radius:8px;margin-top:4px">✅ About the same as usual</div> '}

    h+='<div class="opt '+(wiz.side==='right'?'sel':'')+'" onclick="snapInputs();wiz.side=wiz.side===\'right\'?null:\'right\';showWiz()">🤱 Right</div></div>';

      h+='<div class="step-label" style="margin-top:14px">Duration</div><div class="opts">';
      opts.forEach(function(o){h+='<div class="opt '+(wiz.durMin===o[0]&&!wiz.ongoing?'sel':'')+'" onclick="snapInputs();wiz.durMin='+o[0]+';wiz.ongoing=false;showWiz()">'+o[1]+'</div>'});

    }
  }

  // Pump: multi-select portions + ad hoc ml (no duration/side)
  if(wiz.source==='pump'){
    var now=new Date();
    var pumps=allEv.filter(function(e){return e.type==='pump'&&!e.spoiled&&e.ml&&(!e.expiresAt||e.expiresAt>now)});
    var feedsFromPump=allEv.filter(function(e){return e.type==='feed'&&e.source==='pump'});
    var usedMl={};feedsFromPump.forEach(function(f){
      if(f.linkedPumps){try{JSON.parse(f.linkedPumps).forEach(function(lp){usedMl[lp.id]=(usedMl[lp.id]||0)+lp.ml})}catch(e){}}
      else if(f.linkedPumpId){usedMl[f.linkedPumpId]=(usedMl[f.linkedPumpId]||0)+(f.mlFed||0)}
    });

    h+='<div class="step-label" style="margin-top:14px">Select pump portions</div>';
    if(!pumps.length){h+='<div class="step-sub">No available pump portions</div>'}
    else{h+='<div class="opts" style="flex-direction:column">';
      pumps.forEach(function(p){var rem=p.ml-(usedMl[p.id]||0);var pid=p.pumpId||makePumpId(p);
        var sel=wiz.selectedPumps[p.id]!==undefined;
        h+='<div class="opt '+(sel?'sel':'')+'" onclick="snapInputs();wizTogglePump(\''+p.id+'\','+rem+')" style="width:100%;display:flex;align-items:center;gap:8px">';
        h+='<span>'+(sel?'☑':'☐')+'</span><span style="flex:1">'+pid+' — '+rem+'ml</span>';
        if(sel)h+='<input type="number" id="pump-ml-'+p.id+'" value="'+(wiz.selectedPumps[p.id]||rem)+'" style="width:55px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:6px;font-size:0.85rem" onclick="event.stopPropagation()" oninput="wiz.selectedPumps[\''+p.id+'\']=parseInt(this.value)||0"/>ml';
        h+='</div>';
      });h+='</div>'}
    // Selected totals
    var selTotal=Object.values(wiz.selectedPumps).reduce(function(s,v){return s+v},0);
    var selCount=Object.keys(wiz.selectedPumps).length;
    if(selCount>0)h+='<div style="font-size:0.85rem;font-weight:600;color:var(--purple);margin-top:6px">Selected: '+selTotal+'ml from '+selCount+' portion'+(selCount>1?'s':'')+'</div>';
    // Ad hoc
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:12px"><div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px">Or enter ml without a pump record:</div>';
    h+='<input type="number" id="wiz-adhoc-ml" placeholder="e.g. 60" value="'+(wiz.adHocMl||'')+'" oninput="wiz.adHocMl=parseInt(this.value)||null" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;width:100%;font-size:0.9rem"/></div>';
  }

  h+='<div class="btn-row"><button class="btn-cancel" onclick="closeWiz()">Cancel</button><button class="btn-save" onclick="wizSaveFeed()">Save</button></div>';
  return h}

function wizSaveFeed(){
  if(!wiz.source)wiz.source='breast';
  if(wiz.source==='breast'){
    if(wiz.isNow){wiz.ongoing=true;wiz.durMin=null}
    wizSave();return;
  }
  // Pump feed
  snapInputs();
  // Capture per-pump ml from inputs
  Object.keys(wiz.selectedPumps).forEach(function(pid){
    var el=document.getElementById('pump-ml-'+pid);if(el&&el.value)wiz.selectedPumps[pid]=parseInt(el.value)||0;
  });
  var adEl=document.getElementById('wiz-adhoc-ml');if(adEl&&adEl.value)wiz.adHocMl=parseInt(adEl.value);
  var hasSelection=Object.keys(wiz.selectedPumps).length>0;
  var hasAdHoc=wiz.adHocMl&&wiz.adHocMl>0;
  if(!hasSelection&&!hasAdHoc){alert('Select a pump portion or enter ml');return}

  // Create ad-hoc pump if needed
  var afterAdHoc=function(){
    var linkedArr=Object.keys(wiz.selectedPumps).map(function(pid){return {id:pid,ml:wiz.selectedPumps[pid]}});
    var totalMl=linkedArr.reduce(function(s,x){return s+x.ml},0);
    var data={type:'feed',startTime:firebase.firestore.Timestamp.fromDate(wiz.when),endTime:firebase.firestore.Timestamp.fromDate(wiz.when),duration:0,pee:false,poop:false,createdBy:'web',createdAt:firebase.firestore.Timestamp.now(),source:'pump'};
    if(linkedArr.length>0)data.linkedPumps=JSON.stringify(linkedArr);
    if(totalMl>0)data.mlFed=totalMl;
    db.collection('families').doc(fid).collection('events').add(data).then(function(ref){
      closeWiz();showCelebration();showCelebration();showSnack('🍼 Fed '+totalMl+'ml from pumped milk','undo',ref.id)});
  };

  if(hasAdHoc){
    var adHocData={type:'pump',startTime:firebase.firestore.Timestamp.fromDate(wiz.when),pee:false,poop:false,createdBy:'web-adhoc',createdAt:firebase.firestore.Timestamp.now(),ml:wiz.adHocMl,spoiled:false};
    db.collection('families').doc(fid).collection('events').add(adHocData).then(function(ref){
      wiz.selectedPumps[ref.id]=wiz.adHocMl;afterAdHoc()});
  } else {afterAdHoc()}
}

// Capture text inputs before re-rendering
function snapInputs(){
  var ml=document.getElementById('wiz-pump-ml');
  if(ml){var v=parseInt(ml.value);wiz.ml=isNaN(v)?null:v}
  var mlf=document.getElementById('wiz-ml-fed');
  if(mlf){var v2=parseInt(mlf.value);wiz.mlFed=isNaN(v2)?null:v2}
}

function getNextPumpId(){
  var max=99;
  allEv.forEach(function(e){
    if(e.type!=='pump'||!e.pumpId)return;
    var m=e.pumpId.match(/^(\d+)/);
    if(m){var n=parseInt(m[1]);if(n>max)max=n;}
  });
  return String(max+1);
}

function wizSavePump(){
  snapInputs();
  var mlInput=document.getElementById('wiz-pump-ml');
  wiz.ml=mlInput&&mlInput.value?parseInt(mlInput.value):null;
  var exp=null;
  if(wiz.storage){
    var ms=wiz.when.getTime();
    if(wiz.storage==='room')exp=new Date(ms+4*3600000);
    else if(wiz.storage==='fridge')exp=new Date(ms+4*24*3600000);
    else if(wiz.storage==='freezer')exp=new Date(ms+6*30*24*3600000);
  }
  var pid=getNextPumpId();
  var data={type:'pump',startTime:firebase.firestore.Timestamp.fromDate(wiz.when),pee:false,poop:false,createdBy:'web',createdAt:firebase.firestore.Timestamp.now(),pumpId:pid};
  if(wiz.ml)data.ml=wiz.ml;
  if(wiz.side)data.side=wiz.side;
  if(wiz.storage)data.storage=wiz.storage;
  if(exp)data.expiresAt=firebase.firestore.Timestamp.fromDate(exp);
  data.spoiled=false;
  db.collection('families').doc(fid).collection('events').add(data).then(function(ref){
    closeWiz();showCelebration();showCelebration();showSnack('🧴 Pump logged'+(wiz.ml?' · '+wiz.ml+'ml':''),'undo',ref.id)});
}

function wizSetWhen(m){wiz.when=new Date(Date.now()-m*60000);wiz.isNow=m===0;wiz.whenMins=m;showWiz()}
function wizSetCustom(v){if(!v)return;wiz.when=new Date(v);wiz.isNow=false;showWiz()}
function wizNext(){
  if(wiz.step===0){if(wiz.type==='diaper'){wiz.step=2;showWiz();return}
    if(wiz.isNow){wiz.ongoing=true;wiz.durMin=null;wizSave();return}
    wiz.step=1;showWiz()}
  else if(wiz.step===1){if(!wiz.ongoing&&!wiz.durMin){alert('Pick a duration');return}
    if(wiz.type==='feed'&&wiz.endId&&!wiz.side){wiz.step=3;showWiz();return}
    wizSave()}
  else if(wiz.step===2){if(!wiz.pee&&!wiz.poop){alert('Select at least one');return}wizSave()}}

function wizSave(){
  if(wiz.endId){var dur=wiz.durMin||Math.round((Date.now()-wiz.when.getTime())/60000);
    var upd={endTime:firebase.firestore.Timestamp.fromDate(new Date()),duration:dur};
    if(wiz.side)upd.side=wiz.side;
    db.collection('families').doc(fid).collection('events').doc(wiz.endId).update(upd).then(function(){
      closeWiz();var nm=wiz.type==='sleep'?'😴 Sleep':'🍼 Feed';showSnack(nm+' ended · '+fmtMin(dur))});return}
  var data={type:wiz.type,startTime:firebase.firestore.Timestamp.fromDate(wiz.when),pee:wiz.pee,poop:wiz.poop,createdBy:'web',createdAt:firebase.firestore.Timestamp.now()};
  if(wiz.side)data.side=wiz.side;
  if(wiz.source)data.source=wiz.source;
  if(wiz.linkedPumpId)data.linkedPumpId=wiz.linkedPumpId;
  if(wiz.mlFed)data.mlFed=wiz.mlFed;
  if(wiz.durMin){data.duration=wiz.durMin;data.endTime=firebase.firestore.Timestamp.fromDate(new Date(wiz.when.getTime()+wiz.durMin*60000))}
  db.collection('families').doc(fid).collection('events').add(data).then(function(ref){
    closeWiz();var t=pad(wiz.when.getHours())+':'+pad(wiz.when.getMinutes());
    var msg=displayName2(wiz.type,wiz.pee,wiz.poop)+' at '+t;
    if(wiz.durMin)msg+=' · '+fmtMin(wiz.durMin);if(wiz.side)msg+=' · '+wiz.side;if(wiz.ongoing)msg+=' (ongoing)';
    if(wiz.source==='pump')msg+=' · pumped milk';if(wiz.mlFed)msg+=' · '+wiz.mlFed+'ml';

function showCelebration(){
  var msg=_affirmations[Math.floor(Date.now()/100)%_affirmations.length];
  // Confetti particles
  var overlay=document.createElement('div');
  overlay.className='confetti-overlay';
  var colors=['#f97316','#22c55e','#6366f1','#ec4899','#f59e0b','#2dd4bf'];
  for(var i=0;i<24;i++){
    var p=document.createElement('div');
    var c=colors[i%colors.length];
    var x=Math.random()*100,spd=0.4+Math.random()*0.6,ang=(Math.random()*60)-30;
    p.style.cssText='position:absolute;left:'+x+'%;top:60px;width:'+(6+Math.random()*4)+'px;height:4px;background:'+c+';border-radius:2px;animation:fall'+(i%3)+' '+(1.2+Math.random()*0.8)+'s ease-out forwards';
    overlay.appendChild(p);
  }
  document.body.appendChild(overlay);
  // Message
  var msgEl=document.createElement('div');
  msgEl.className='confetti-msg';
  msgEl.innerHTML='🎉 '+msg;
  document.body.appendChild(msgEl);
  // Particle keyframes (inject once)
  if(!document.getElementById('confetti-style')){
    var s=document.createElement('style');s.id='confetti-style';
    s.textContent='@keyframes fall0{to{transform:translateY(60vh) rotate(180deg);opacity:0}}@keyframes fall1{to{transform:translateY(70vh) rotate(-90deg) translateX(40px);opacity:0}}@keyframes fall2{to{transform:translateY(55vh) rotate(270deg) translateX(-30px);opacity:0}}';
    document.head.appendChild(s);
  }
  setTimeout(function(){overlay.remove();msgEl.remove();},2000);
}

function saveEdit(id,type){var st=new Date(document.getElementById('ed-st').value);

  if(type!=='diaper'&&type!=='pump'){var de=document.getElementById('ed-dur');var dur=de&&de.value?parseInt(de.value):null;
    if(dur){upd.duration=dur;upd.endTime=firebase.firestore.Timestamp.fromDate(new Date(st.getTime()+dur*60000))}

  if(type==='feed'){
    var sl=document.getElementById('ed-sl'),sr=document.getElementById('ed-sr');
    if(sl&&sl.classList.contains('sel'))upd.side='left';else if(sr&&sr.classList.contains('sel'))upd.side='right';
    else upd.side=firebase.firestore.FieldValue.delete();
    // Collect selected pump portions
    var linkedArr=[];
    allEv.filter(function(p){return p.type==='pump';}).forEach(function(p){
      var cb=document.getElementById('ed-pump-cb-'+p.id);
      if(cb&&cb.checked){
        var mlEl=document.getElementById('ed-pump-ml-'+p.id);
        var ml=mlEl&&mlEl.value?parseInt(mlEl.value):0;
        if(ml>0)linkedArr.push({id:p.id,ml:ml});
      }
    });
    if(linkedArr.length>0){
      upd.linkedPumps=JSON.stringify(linkedArr);
      upd.mlFed=linkedArr.reduce(function(s,x){return s+x.ml},0);
      upd.source='pump';
      upd.linkedPumpId=firebase.firestore.FieldValue.delete();
    }
  }
  if(type==='diaper'){upd.pee=document.getElementById('ed-pee').classList.contains('sel');upd.poop=document.getElementById('ed-poop').classList.contains('sel')}
  if(type==='pump'){
    var mlEl=document.getElementById('ed-ml');upd.ml=mlEl&&mlEl.value?parseInt(mlEl.value):null;
    var psl=document.getElementById('ed-psl'),psr=document.getElementById('ed-psr'),psb=document.getElementById('ed-psb');
    if(psl&&psl.classList.contains('sel'))upd.side='left';else if(psr&&psr.classList.contains('sel'))upd.side='right';
    else if(psb&&psb.classList.contains('sel'))upd.side='both';else upd.side=firebase.firestore.FieldValue.delete();
    var str=document.getElementById('ed-str'),stf=document.getElementById('ed-stf'),stz=document.getElementById('ed-stz');
    if(str&&str.classList.contains('sel')){upd.storage='room';upd.expiresAt=firebase.firestore.Timestamp.fromDate(new Date(st.getTime()+4*3600000))}
    else if(stf&&stf.classList.contains('sel')){upd.storage='fridge';upd.expiresAt=firebase.firestore.Timestamp.fromDate(new Date(st.getTime()+4*24*3600000))}
    else if(stz&&stz.classList.contains('sel')){upd.storage='freezer';upd.expiresAt=firebase.firestore.Timestamp.fromDate(new Date(st.getTime()+6*30*24*3600000))}
    // preserve existing numeric pumpId; only regenerate if it was a legacy date-based id
    var existingEv=allEv.find(function(e){return e.id===id});
    if(!existingEv||!existingEv.pumpId||!/^\d+/.test(existingEv.pumpId)){upd.pumpId=makePumpIdFromData(st,upd.ml,upd.storage);}
  }
  db.collection('families').doc(fid).collection('events').doc(id).update(upd).then(function(){closeWiz()})}

// ==================== HELPERS ====================
function findOngoing(){var now=Date.now();return allEv.find(function(e){
  if(e.type!=='sleep'&&e.type!=='feed')return false;
  if(e.duration!==undefined&&e.duration!==null)return false;
  if(e.endTime)return false;
  if(e.source==='pump')return false;
  // Sanity: if started more than 12h ago, it's stale, not really ongoing
  if(now-e.startTime.getTime()>43200000)return false;
  return true})||null}
function lastOf(type){return allEv.find(function(e){return e.type===type})||null}
function displayName(e){if(e.type==='sleep')return '😴 Sleep';if(e.type==='feed')return e.source==='pump'?'🧴 Pumped Feed':'🍼 Feed';
  if(e.type==='diaper'){if(e.pee&&e.poop)return '🧷 Pee + Poop';if(e.poop)return '💩 Poop';if(e.pee)return '💧 Pee';return '🧷 Diaper'}
  if(e.type==='pump')return '🧴 Pump';return e.type}
function displayName2(type,pee,poop){if(type==='sleep')return '😴 Sleep';if(type==='feed')return '🍼 Feed';
  if(type==='diaper'){if(pee&&poop)return '🧷 Pee + Poop';if(poop)return '💩 Poop';if(pee)return '💧 Pee';return '🧷 Diaper'}
  if(type==='pump')return '🧴 Pump';return type}
function fmt(ms){if(!ms||ms<=0)return '--';var m=Math.round(ms/60000);if(m<60)return m+'m';var h=Math.floor(m/60),r=m%60;return r?h+'h '+r+'m':h+'h'}
function fmtMin(v){if(!v||v<=0)return '--';var m=Math.round(v);if(m<60)return m+'m';var h=Math.floor(m/60),r=m%60;return r?h+'h '+r+'m':h+'h'}
function pad(n){return n<10?'0'+n:''+n}
function effectiveDay(d){if(d.getHours()<6)return new Date(d.getTime()-86400000);return d}
function dayLabel(d){var ed=effectiveDay(d);var now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var dd2=new Date(ed.getFullYear(),ed.getMonth(),ed.getDate());
  if(dd2.getTime()===today.getTime())return 'Today';if(dd2.getTime()===today.getTime()-864e5)return 'Yesterday';
  var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[ed.getDay()]+', '+months[ed.getMonth()]+' '+ed.getDate()}
function getPeriod(d){var h=d.getHours();if(h>=0&&h<6)return 'night';if(h>=6&&h<12)return 'morning';if(h>=12&&h<18)return 'afternoon';return 'evening'}
function periodDisplay(key){var em={night:'🌙',morning:'🌅',afternoon:'☀️',evening:'🌇'};var nm={night:'Night (00-06)',morning:'Morning (06-12)',afternoon:'Afternoon (12-18)',evening:'Evening (18-00)'};return em[key]+' '+nm[key]}
function dkey(d){var t=d instanceof Date?d:new Date(d);return t.getFullYear()+'-'+(t.getMonth()+1).toString().padStart(2,'0')+'-'+t.getDate().toString().padStart(2,'0')}
function sdate(k){var p=k.split('-');var mo=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mo[+p[1]]+' '+(+p[2])}
function dtLocal(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())}
function shortDate(d){return pad(d.getDate())+'/'+pad(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes())}
function makePumpId(e){var d=e.startTime;var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()]+' '+d.getDate()+' '+pad(d.getHours())+':'+pad(d.getMinutes())+(e.ml?' · '+e.ml+'ml':'')+(e.storage?' · '+e.storage:'')}
function makePumpIdFromWiz(){return makePumpIdFromData(wiz.when,wiz.ml,wiz.storage)}
function makePumpIdFromData(d,ml,storage){var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()]+' '+d.getDate()+' '+pad(d.getHours())+':'+pad(d.getMinutes())+(ml?' · '+ml+'ml':'')+(storage?' · '+storage:'')}
</script>
